onboarding = false

[theme]
name = "tokyo-night"

[terminal]
shell_mode = "auto"
new_cwd = "home"

[keys]
prefix = "ctrl+b"
help = "prefix+?"
settings = "prefix+s"
detach = "prefix+q"
reload_config = "prefix+shift+r"
open_notification_target = "prefix+o"
workspace_picker = "prefix+w"
goto = ["prefix+g", "ctrl+alt+g"]
new_workspace = "prefix+shift+n"
new_worktree = "prefix+shift+g"
rename_workspace = "prefix+shift+w"
close_workspace = "prefix+shift+d"
previous_workspace = "ctrl+alt+shift+comma"
next_workspace = "ctrl+alt+shift+period"
focus_agent = "prefix+alt+1..9"
new_tab = ["prefix+c", "ctrl+alt+c"]
rename_tab = "prefix+shift+t"
previous_tab = ["prefix+p", "ctrl+alt+comma"]
next_tab = ["prefix+n", "ctrl+alt+period"]
switch_tab = ["prefix+1..9", "ctrl+alt+1..9"]
switch_workspace = "ctrl+alt+shift+1..9"
close_tab = "prefix+shift+x"
rename_pane = "prefix+shift+p"
edit_scrollback = "prefix+e"
copy_mode = "prefix+["
focus_pane_left = ["prefix+h", "ctrl+alt+h"]
focus_pane_down = ["prefix+j", "ctrl+alt+j"]
focus_pane_up = ["prefix+k", "ctrl+alt+k"]
focus_pane_right = ["prefix+l", "ctrl+alt+l"]
swap_pane_left = ["prefix+shift+h", "ctrl+alt+shift+h"]
swap_pane_down = ["prefix+shift+j", "ctrl+alt+shift+j"]
swap_pane_up = ["prefix+shift+k", "ctrl+alt+shift+k"]
swap_pane_right = ["prefix+shift+l", "ctrl+alt+shift+l"]
cycle_pane_next = "prefix+tab"
cycle_pane_previous = "prefix+shift+tab"
split_vertical = ["prefix+v", "ctrl+alt+d"]
split_horizontal = ["prefix+minus", "ctrl+alt+shift+d"]
close_pane = "prefix+x"
zoom = ["prefix+z", "ctrl+alt+z"]
resize_mode = "prefix+r"
toggle_sidebar = "prefix+b"
navigate_workspace_up = "up"
navigate_workspace_down = "down"
navigate_pane_left = "h"
navigate_pane_down = "j"
navigate_pane_up = "k"
navigate_pane_right = "l"

[[keys.command]]
key = "prefix+alt+g"
type = "popup"
command = "lazygit"
description = "open lazygit"
width = "90%"
height = "90%"

[[keys.command]]
key = "prefix+alt+t"
type = "popup"
command = "tv"
description = "open television"
width = "70%"
height = "70%"

[ui]
sidebar_width = 14
sidebar_min_width = 10
sidebar_max_width = 16
sidebar_collapsed_mode = "compact"
mouse_capture = true
copy_on_select = true
confirm_close = false
prompt_new_tab_name = false
pane_borders = true
pane_gaps = true
agent_panel_sort = "spaces"

[ui.sidebar.agents]
row_gap = 0
rows = [["state_icon", "workspace", "tab"], ["agent"]]

[ui.sidebar.spaces]
row_gap = 0
rows = [["state_icon", "workspace"], ["branch", "git_status"]]

[ui.toast]
delivery = "herdr"
delay_seconds = 1

[ui.toast.herdr]
position = "bottom-right"

[ui.sound]
enabled = true

[session]
resume_agents_on_restore = true

[experimental]
pane_history = false
