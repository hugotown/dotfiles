# ============================================================
#  Kitty config — Tokyo Night (Night)
#  Hugo Ruiz
# ============================================================

# ----- Fuente -----
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        19.0

# ----- Cursor -----
cursor_shape          beam
cursor_blink_interval 0.5

# ----- Scrollback -----
scrollback_lines 10000

# ----- Ventana -----
remember_window_size  no
hide_window_decorations titlebar-only
window_padding_width  13
background_opacity     0.9
macos_titlebar_color   background
macos_option_as_alt    yes
confirm_os_window_close 0

macos_quit_when_last_window_closed yes

# ----- Tab bar (minimalista) -----
tab_bar_edge          top
tab_bar_style         powerline
tab_powerline_style   slanted
tab_title_template    "{index}:{title}"

# ----- Campana -----
enable_audio_bell no

# ============================================================
#  Tema: Tokyo Night (Night)
# ============================================================
foreground            #a9b1d6
background            #1a1b26
selection_foreground  none
selection_background  #7aa2f7

# Cursor
cursor                #c0caf5
cursor_text_color     #1a1b26

# URL underline
url_color             #7aa2f7

# Bordes de splits
active_border_color   #7aa2f7
inactive_border_color #292e42

# Tabs
active_tab_foreground   #1a1b26
active_tab_background    #7aa2f7
active_tab_font_style   bold
inactive_tab_foreground #545c7e
inactive_tab_background #16161e
tab_bar_background      #16161e

# Colores normales
color0  #32344a
color1  #f7768e
color2  #9ece6a
color3  #e0af68
color4  #7aa2f7
color5  #ad8ee6
color6  #449dab
color7  #787c99

# Colores brillantes
color8  #444b6a
color9  #ff7a93
color10 #b9f27c
color11 #ff9e64
color12 #7da6ff
color13 #bb9af7
color14 #0db9d7
color15 #acb0d0

# ============================================================
#  Atajos de teclado
# ============================================================
# Mover tabs (igual que tu wezterm)
map cmd+alt+left  move_tab_backward
map cmd+alt+right move_tab_forward
map cmd+shift+left  move_tab_to first
map cmd+shift+right move_tab_to last

# Navegación de tabs
map cmd+1 goto_tab 1
map cmd+2 goto_tab 2
map cmd+3 goto_tab 3
map cmd+4 goto_tab 4
map cmd+5 goto_tab 5

# Fullscreen
map f11 toggle_fullscreen
map ctrl+cmd+f toggle_fullscreen
