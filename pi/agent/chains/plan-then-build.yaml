name: plan-then-build
description: First @plan analyzes and produces a verifiable plan, then @build implements it
steps:
  - agent: plan
    prompt: |
      The user wants to: $ORIGINAL

      Produce a concrete, verifiable implementation plan following your standard format.
      Investigate the codebase first if relevant. End with a clear "Plan" section that
      another agent can execute without further clarification.

  - agent: build
    prompt: |
      Implement the following approved plan. The user's original request was: $ORIGINAL

      ===== PLAN FROM @plan =====
      $INPUT
      ===== END PLAN =====

      Execute the plan exactly. Do not deliberate further about approach. Report files
      changed, verification commands run, and any assumptions you had to make.
