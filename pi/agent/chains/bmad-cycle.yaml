name: bmad-cycle
description: Full BMAD 3-step cycle for one story (create-story → dev-story → code-review+push)
steps:
  - agent: bmad-create-story
    prompt: |
      bmad-create-story $ORIGINAL || no importa lo que diga github haremos esta historia

      The story identifier is: $ORIGINAL

      Read the workflow at .claude/skills/bmad-create-story/workflow.md and execute it
      exactly for this story. After completion, verify sprint-status.yaml advanced this
      story to `ready-for-dev`.

  - agent: bmad-dev-story
    prompt: |
      bmad-dev-story => $ORIGINAL || no importa lo que diga github, desarrollaremos esta
      historia, antes de desarrollar la historia por favor lee:
      docs/planning-artifacts/architecture.md,
      docs/planning-artifacts/ux-design-specification.md,
      docs/planning-artifacts/{mockups-html,mockups-images}
      || por favor usar webfetch websearch por cada librería/paquete con su versión
      además de tocar base con ctx7 'npx ctx7 --help' para cada archivo/actividad y
      con ello obtener las referencias de implementación más recientes

      The story identifier is: $ORIGINAL

      Read the workflow at .claude/skills/bmad-dev-story/workflow.md and execute it
      exactly. After completion, sprint-status.yaml should show this story as `review`
      (or already `done` if the dev workflow includes review handoff).

  - agent: bmad-code-review
    prompt: |
      bmad-code-review $ORIGINAL || no importa lo que diga github, desarrollaremos esta
      historia, antes de revisarla por favor lee:
      docs/planning-artifacts/architecture.md,
      docs/planning-artifacts/ux-design-specification.md,
      docs/planning-artifacts/{mockups-html,mockups-images}
      || por favor usar webfetch websearch por cada librería/paquete con su versión
      además de tocar base con ctx7 'npx ctx7 --help' para cada archivo/actividad y
      con ello obtener las referencias de implementación más recientes
      || cuando termines y todo funcione haz commit and push, esta tarea no se
      considera terminada hasta que todos los criterios de aceptación de la historia
      pasen y todas las pruebas pasen.

      The story identifier is: $ORIGINAL

      Read the workflow at .claude/skills/bmad-code-review/workflow.md and execute it
      exactly. After commit+push, sprint-status.yaml must show this story as `done`.
