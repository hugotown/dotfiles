name: clarify
# Task 29 — AI-ask delegation feeding an llm node.
# Adjust provider/model to one available in your pi config if these patterns don't match.
vsm:
  - sipoc: discovery
    nodes:
      - { id: scope, action: ask, aiAssisted: true, prompt: "Clarify the auth scope before scouting.", depends_on: [] }
      - id: scout
        action: llm
        aiAssisted: true
        provider: github-copilot
        model: claude-sonnet-4.6
        variant: low
        instructions: "Scout. file:line only."
        prompt: "Find the relevant code. DECISIONS: $scope.output"
        depends_on: [scope]
