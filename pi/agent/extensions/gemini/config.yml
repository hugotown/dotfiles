# Config for the Gemini flag form panel. Edit and restart pi to apply.
# Key ids follow pi's format (see docs/keybindings.md): up, down, left, right,
# enter, escape, tab, space, letters a-z, and modifiers like ctrl+x, shift+tab.

keymap:
  # Key that opens the panel — pressed AFTER the editor text ends with a `--gemini-*`
  # flag (e.g. type `--gemini-generate-image` then press this key). When the text is
  # not a complete gemini flag, the key passes through to normal autocompletion.
  trigger:
    key: tab
  # Navigation inside the panel. Any key in a list triggers that action.
  nav:
    up: [up, k, shift+tab] # previous field / button
    down: [down, j, tab] # next field / button
    prev: [left, h] # cycle an enum/bool field to the previous value
    next: [right, l, space] # cycle an enum/bool field to the next value
    edit: [enter, return] # edit a text/number field, or activate the focused button
    cancel: [escape, esc] # close without running

# Panel size (the centered overlay). width/maxHeight accept absolute columns/rows
# (a number) or a percentage string of the terminal (e.g. "60%"); minWidth is a floor
# in columns so the form stays usable on narrow terminals.
panel:
  width: "80%"
  minWidth: 48
  maxHeight: "80%"

# Panel colors. Omit `theme` (or any single value) to use the Tokyo Night defaults.
# Uncomment to override:
# theme:
#   panelBg: "#16161e" # solid panel background
#   selectedBg: "#292e42" # selected row / title bar
#   fg: "#c0caf5" # default text / selected value
#   muted: "#565f89" # unselected values
#   dim: "#737aa2" # field labels / separator
#   blue: "#7aa2f7" # title
#   green: "#9ece6a" # Accept button
#   red: "#f7768e" # Cancel button
#   yellow: "#e0af68"
