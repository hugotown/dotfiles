# Config for the subagent panel. Edit and restart pi to apply.
# Key ids follow pi's format (see docs/keybindings.md): up, down, left, right,
# escape, enter, letters a-z, and modifiers like ctrl+x.

keymap:
  # Gesture that opens the panel (only when the editor is EMPTY — you are not typing —
  # AND at least one subagent is currently working).
  trigger:
    key: left # key to watch
    windowMs: 300 # max ms between the two presses for a "double"
  # Navigation inside the panel. Any key in a list triggers that action.
  nav:
    up: [up, k] # previous agent in the left list
    down: [down, j] # next agent in the left list
    close: [escape, q, h, left] # close the panel

# Panel colors. Omit `theme` (or any single value) to use the Tokyo Night defaults.
# Uncomment to override:
# theme:
#   panelBg: "#16161e" # solid panel background
#   selectedBg: "#292e42" # selected row / title bar
#   fg: "#c0caf5" # default text
#   muted: "#565f89" # tool calls / unselected rows
#   dim: "#737aa2" # skipped / pending / separator
#   blue: "#7aa2f7" # titles / accents
#   green: "#9ece6a" # ok
#   red: "#f7768e" # failed / error
#   yellow: "#e0af68" # running
