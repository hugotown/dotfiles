# ============================================================================
# archon_sldc_fixer_file — ATOMIC CELL: apply review findings to ONE file
#
# Suite: archon_sldc_*. Contract (D2): $ARGUMENTS = path to a *.fix-request.md
# with flat frontmatter: contractPath, phase, reviewPath, resultPath,
# progressPath, attempt. Output: UPDATED result file at resultPath (D7 schema)
# + sink line "STATUS PATH".
#
# The fixer evaluates each finding on its technical merits (it may push back
# in the result body — never blind-apply), fixes ONLY its own logical file
# (R12), re-verifies with the contract's verify commands, and never commits
# (R21). Like the worker, it ALWAYS terminates in state (R10).
#
# Standalone run:
#   archon workflow run archon_sldc_fixer_file ".archon/sldc/fixes/<slug>.<phase>.fix-request.md"
# ============================================================================

name: archon_sldc_fixer_file
description: >
  Atomic cell of the archon_sldc suite: applies the findings of ONE review to
  ONE logical file under its frozen CONTRACT MASTER. Input is a
  *.fix-request.md path in $ARGUMENTS (contractPath, phase, reviewPath,
  resultPath, progressPath). Evaluates findings critically, fixes only its
  own file, re-verifies, and rewrites the result handoff with status
  DONE|BLOCKED; never commits. DONE results are re-verified deterministically.

provider: opencode
model: medium
worktree:
  enabled: false

nodes:
  # --------------------------------------------------------------------------
  # 1) Fail-fast deterministic input validation
  # --------------------------------------------------------------------------
  - id: validate-request
    timeout: 15000
    bash: |
      set -u
      REQ="$ARGUMENTS"
      fm() { sed -n '/^---$/,/^---$/p' "$1" | sed -n "s/^$2:[[:space:]]*//p" | head -1 | sed -e 's/^["'\'']//' -e 's/["'\'']$//'; }
      [ -n "$REQ" ] || { echo "ERROR: \$ARGUMENTS must be the path to a *.fix-request.md handoff" >&2; exit 1; }
      [ -f "$REQ" ] || { echo "ERROR: fix request not found: $REQ" >&2; exit 1; }
      CONTRACT=$(fm "$REQ" contractPath); REVIEW=$(fm "$REQ" reviewPath)
      PHASE=$(fm "$REQ" phase); RESULT=$(fm "$REQ" resultPath); PROGRESS=$(fm "$REQ" progressPath)
      for kv in "contractPath=$CONTRACT" "reviewPath=$REVIEW" "phase=$PHASE" "resultPath=$RESULT" "progressPath=$PROGRESS"; do
        [ -n "${kv#*=}" ] || { echo "ERROR: request frontmatter missing required key: ${kv%%=*}" >&2; exit 1; }
      done
      [ -f "$CONTRACT" ] || { echo "ERROR: contract not found: $CONTRACT" >&2; exit 1; }
      [ -f "$REVIEW" ] || { echo "ERROR: review with findings not found: $REVIEW" >&2; exit 1; }
      mkdir -p "$(dirname "$RESULT")" "$(dirname "$PROGRESS")"
      echo "request=$REQ phase=$PHASE review=$REVIEW result=$RESULT"

  # --------------------------------------------------------------------------
  # 2) Fix loop — same discipline as the worker (fresh context + progress
  #    file D8; terminal state in the result file, R10)
  # --------------------------------------------------------------------------
  - id: fix
    depends_on: [validate-request]
    loop:
      prompt: |
        You are a FRESH file fixer of the archon_sldc suite (resolutive
        method). You apply the findings of ONE review to ONE logical file for
        ONE phase.

        SKILL INJECTION (R16 — mandatory, do this FIRST): read COMPLETELY,
        with the Read tool, each of these skill files before any other action:
        - ~/.config/opencode/skills/receiving-code-review/SKILL.md
        - ~/.config/opencode/skills/verification-before-completion/SKILL.md
        - ~/.config/opencode/skills/systematic-debugging/SKILL.md
        WORKFLOW OVERRIDES win over any skill guidance: never commit (R21),
        never advance phases, never touch git state.

        YOUR FIX REQUEST: $ARGUMENTS
        Read it. Its frontmatter gives you: contractPath (frozen CONTRACT
        MASTER), phase, reviewPath (the findings to address), resultPath
        (the result handoff you must REWRITE), progressPath (your iteration
        scratchpad).

        RESUME PROTOCOL (D8): if progressPath exists, read it first and
        continue from there — do not restart.

        FIX DISCIPLINE:
        - Read the contract, the review findings, and the current code.
        - Evaluate EACH finding on its technical merits before applying it.
          A wrong finding is NOT applied — you document the rebuttal with
          evidence in the result body instead (never performative agreement).
        - Fix ONLY inside this contract's allowedPaths (R12); frozen public
          signatures stay law (R13) — a finding that requires a signature
          change is a BLOCKED outcome for triage, not a fix.
        - Re-run the contract's verifyLint / verifyTest commands to verify
          your changes before claiming DONE.
        - On errors: systematic debugging, max 3 bounded attempts per
          distinct error, then BLOCKED (R10/R11).

        END OF EVERY ITERATION (mandatory):
        - Not terminal yet: write progressPath (done / verbatim error / next
          step) and end WITHOUT the promise.
        - Terminal: REWRITE resultPath with flat frontmatter:
            contractId, phase, status: DONE|BLOCKED, attempts, producedBy:
            archon_sldc_fixer_file, workflowRunId: $WORKFLOW_ID
          and XML body:
            <result><diff>bounded summary of the fixes</diff>
            <evidence>verify commands + output tail</evidence>
            <rebuttals>findings NOT applied + technical justification
            </rebuttals>
            <blocked reason="...">only if BLOCKED</blocked></result>
          Delete progressPath, then output: <promise>FIXER_DONE</promise>
      until: FIXER_DONE
      until_bash: |
        set -u
        fm() { sed -n '/^---$/,/^---$/p' "$1" | sed -n "s/^$2:[[:space:]]*//p" | head -1 | sed -e 's/^["'\'']//' -e 's/["'\'']$//'; }
        REQ="$ARGUMENTS"
        RESULT=$(fm "$REQ" resultPath)
        [ -n "$RESULT" ] && [ -f "$RESULT" ] || exit 1
        [ "$(fm "$RESULT" producedBy)" = "archon_sldc_fixer_file" ] || exit 1
        ST=$(fm "$RESULT" status)
        case "$ST" in DONE|BLOCKED) exit 0 ;; *) exit 1 ;; esac
      max_iterations: 4
      fresh_context: true

  # --------------------------------------------------------------------------
  # 3) Deterministic result gate (same as worker: DONE must survive
  #    re-verification; BLOCKED is data)
  # --------------------------------------------------------------------------
  - id: verify-result
    depends_on: [fix]
    always_run: true
    timeout: 900000
    bash: |
      set -u
      fm() { sed -n '/^---$/,/^---$/p' "$1" | sed -n "s/^$2:[[:space:]]*//p" | head -1 | sed -e 's/^["'\'']//' -e 's/["'\'']$//'; }
      REQ="$ARGUMENTS"
      RESULT=$(fm "$REQ" resultPath); CONTRACT=$(fm "$REQ" contractPath)
      [ -f "$RESULT" ] || { echo "ERROR: fixer ended without a result file at $RESULT (R10 violated)" >&2; exit 1; }
      ST=$(fm "$RESULT" status)
      case "$ST" in
        BLOCKED)
          echo "BLOCKED accepted as data (R10/R11) — escalation belongs to the caller"
          ;;
        DONE)
          LINT=$(fm "$CONTRACT" verifyLint); TEST=$(fm "$CONTRACT" verifyTest)
          if [ -n "$LINT" ]; then
            echo "re-verify lint: $LINT"
            sh -c "$LINT" || { echo "ERROR: result says DONE but verifyLint fails (lying handoff)" >&2; exit 1; }
          fi
          if [ -n "$TEST" ]; then
            echo "re-verify test: $TEST"
            sh -c "$TEST" || { echo "ERROR: result says DONE but verifyTest fails (lying handoff)" >&2; exit 1; }
          fi
          echo "DONE re-verified"
          ;;
        *)
          echo "ERROR: result file has invalid status '$ST' (must be DONE|BLOCKED)" >&2; exit 1
          ;;
      esac

  # --------------------------------------------------------------------------
  # 4) Sink — one plain parseable line: STATUS RESULT_PATH (R22)
  # --------------------------------------------------------------------------
  - id: report
    depends_on: [verify-result]
    always_run: true
    timeout: 15000
    bash: |
      set -u
      fm() { sed -n '/^---$/,/^---$/p' "$1" | sed -n "s/^$2:[[:space:]]*//p" | head -1 | sed -e 's/^["'\'']//' -e 's/["'\'']$//'; }
      RESULT=$(fm "$ARGUMENTS" resultPath)
      printf '%s %s\n' "$(fm "$RESULT" status)" "$RESULT"
