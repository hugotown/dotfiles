# ============================================================================
# archon_sldc_worker_file — ATOMIC CELL: one task (contract + phase) → result
#
# Suite: archon_sldc_* (resolutive method on Archon v0.5.0).
# Contract (D2/D12): $ARGUMENTS = path to a *.task.md handoff with flat
# frontmatter keys: contractPath, phase, resultPath, progressPath, attempt.
# Output: result file at resultPath (D7 schema) + sink line "STATUS PATH".
#
# Rules honored: R6 (sentinel RED is contractual), R10 (worker always ends in
# state DONE|BLOCKED — errors travel as data), R12 (never touches another
# file), R13 (frozen signatures are law), R16 (skills injected via mandatory
# SKILL.md reads — provider is opencode, Archon `skills:` is Claude-only),
# R21 (never commits), R22 (no structured output; handoff files only).
#
# Standalone run:
#   archon workflow run archon_sldc_worker_file ".archon/sldc/tasks/<slug>.<phase>.task.md"
# The parent (archon_sldc_batch / archon_sldc_execute) owns isolation; this
# cell always runs in the caller's checkout (worktree disabled).
# ============================================================================

name: archon_sldc_worker_file
description: >
  Atomic cell of the archon_sldc suite: one FRESH TDD worker executes ONE
  logical file's work for ONE phase under its frozen CONTRACT MASTER. Input is
  a *.task.md handoff path in $ARGUMENTS (contractPath, phase, resultPath,
  progressPath). Always terminates in state: writes a result file with
  status DONE or BLOCKED plus bounded diff and evidence; never commits. DONE
  results are re-verified deterministically (a lying handoff fails the run).

provider: opencode
model: medium
worktree:
  enabled: false

nodes:
  # --------------------------------------------------------------------------
  # 1) Fail-fast deterministic input validation (D1: no discovery fallback)
  # --------------------------------------------------------------------------
  - id: validate-task
    timeout: 15000
    bash: |
      set -u
      TASK="$ARGUMENTS"
      fm() { sed -n '/^---$/,/^---$/p' "$1" | sed -n "s/^$2:[[:space:]]*//p" | head -1 | sed -e 's/^["'\'']//' -e 's/["'\'']$//'; }
      [ -n "$TASK" ] || { echo "ERROR: \$ARGUMENTS must be the path to a *.task.md handoff (D1: the worker never discovers work)" >&2; exit 1; }
      [ -f "$TASK" ] || { echo "ERROR: task file not found: $TASK" >&2; exit 1; }
      CONTRACT=$(fm "$TASK" contractPath); PHASE=$(fm "$TASK" phase)
      RESULT=$(fm "$TASK" resultPath); PROGRESS=$(fm "$TASK" progressPath)
      for kv in "contractPath=$CONTRACT" "phase=$PHASE" "resultPath=$RESULT" "progressPath=$PROGRESS"; do
        [ -n "${kv#*=}" ] || { echo "ERROR: task frontmatter missing required key: ${kv%%=*}" >&2; exit 1; }
      done
      [ -f "$CONTRACT" ] || { echo "ERROR: contract not found: $CONTRACT" >&2; exit 1; }
      CID=$(fm "$CONTRACT" contractId); TF=$(fm "$CONTRACT" targetFile)
      [ -n "$CID" ] && [ -n "$TF" ] || { echo "ERROR: contract $CONTRACT missing contractId/targetFile" >&2; exit 1; }
      mkdir -p "$(dirname "$RESULT")" "$(dirname "$PROGRESS")"
      echo "task=$TASK contract=$CID phase=$PHASE result=$RESULT"

  # --------------------------------------------------------------------------
  # 2) Implement loop — fresh context per iteration; state travels in the
  #    progress file (D8), termination state in the result file (D4/R10).
  #    until_bash is the authoritative check: a valid result file exists.
  # --------------------------------------------------------------------------
  - id: implement
    depends_on: [validate-task]
    loop:
      prompt: |
        You are a FRESH contract worker of the archon_sldc suite (resolutive
        method). You own exactly ONE logical file for exactly ONE phase.

        SKILL INJECTION (R16 — mandatory, do this FIRST): read COMPLETELY,
        with the Read tool, each of these skill files before any other action:
        - ~/.config/opencode/skills/test-driven-development/SKILL.md
        - ~/.config/opencode/skills/verification-before-completion/SKILL.md
        - ~/.config/opencode/skills/systematic-debugging/SKILL.md
        Apply them within YOUR phase only. WORKFLOW OVERRIDES win over any
        skill guidance: never commit (R21), never advance phases, never touch
        git state.

        YOUR TASK FILE: $ARGUMENTS
        Read it. Its frontmatter gives you: contractPath (your CONTRACT
        MASTER), phase (your ONLY phase), resultPath (where your final
        handoff goes), progressPath (your iteration scratchpad).

        RESUME PROTOCOL (D8): if progressPath exists, read it first — it is
        your own note from the previous iteration (what is done, the verbatim
        error, the next step). Continue from there, do not restart.

        CONTRACT DISCIPLINE: read the CONTRACT MASTER completely. Frozen
        public signatures are law (R13). Only create/modify files inside the
        contract's allowedPaths (R12: never another file's code). The
        contract's verifyLint / verifyTest commands are how YOU verify your
        own work — run them before claiming anything.

        PHASE DUTIES (do only what your phase asks):
        - A-STUBS: write the stub honoring every frozen signature + the
          sentinel test exactly as <sentinel> specifies (contractual RED, R6).
        - B-TESTS: write the full test suite against the frozen interface;
          tests must fail through the sentinel (sentinel matches, zero
          non-sentinel failures).
        - D-IMPL: implement until this file's own tests are GREEN.
        - F-HARDENING: error paths, input validation, resilience — WITHOUT
          mutating frozen shared signatures (signature-breaking hardening =
          report BLOCKED for triage, R13).
        - G-EDGE: edge-case coverage + handling, same constraints.
        - I-REFACTOR: clarity only; no behavior change, no signature change
          (needed signature change = BLOCKED for re-freeze).
        - VERTICAL-SLICE: the full cycle for this file: test → contractual
          RED via sentinel → implement → GREEN → harden → refactor.

        ERROR PROTOCOL (R10/R11/R12): on any failure, debug systematically —
        at most 3 bounded attempts per distinct error. If still stuck, STOP:
        the error travels as DATA, never as a crash.

        END OF EVERY ITERATION (mandatory):
        - If the work is NOT terminal yet: write progressPath (what is done,
          verbatim error if any, next step) and end WITHOUT the promise.
        - If terminal (work verified OR genuinely blocked): write resultPath
          as a .md file with flat frontmatter:
            contractId, phase, status: DONE|BLOCKED, attempts, producedBy:
            archon_sldc_worker_file, workflowRunId: $WORKFLOW_ID
          and XML body:
            <result><diff>bounded summary of changes (allowedPaths only)
            </diff><evidence>verify commands you ran + output tail</evidence>
            <blocked reason="...">only if BLOCKED: systematic diagnosis, what
            was tried</blocked></result>
          Delete progressPath, then output: <promise>WORKER_DONE</promise>
      until: WORKER_DONE
      until_bash: |
        set -u
        fm() { sed -n '/^---$/,/^---$/p' "$1" | sed -n "s/^$2:[[:space:]]*//p" | head -1 | sed -e 's/^["'\'']//' -e 's/["'\'']$//'; }
        TASK="$ARGUMENTS"
        RESULT=$(fm "$TASK" resultPath)
        [ -n "$RESULT" ] && [ -f "$RESULT" ] || exit 1
        ST=$(fm "$RESULT" status)
        case "$ST" in DONE|BLOCKED) exit 0 ;; *) exit 1 ;; esac
      max_iterations: 4
      fresh_context: true

  # --------------------------------------------------------------------------
  # 3) Deterministic result gate (D4): DONE must survive re-verification —
  #    a lying handoff is a real workflow failure. BLOCKED is DATA (exit 0).
  # --------------------------------------------------------------------------
  - id: verify-result
    depends_on: [implement]
    always_run: true
    timeout: 900000
    bash: |
      set -u
      fm() { sed -n '/^---$/,/^---$/p' "$1" | sed -n "s/^$2:[[:space:]]*//p" | head -1 | sed -e 's/^["'\'']//' -e 's/["'\'']$//'; }
      TASK="$ARGUMENTS"
      RESULT=$(fm "$TASK" resultPath); CONTRACT=$(fm "$TASK" contractPath)
      [ -f "$RESULT" ] || { echo "ERROR: worker ended without a result file at $RESULT (R10 violated)" >&2; exit 1; }
      ST=$(fm "$RESULT" status)
      case "$ST" in
        BLOCKED)
          echo "BLOCKED accepted as data (R10/R11) — escalation belongs to the caller"
          ;;
        DONE)
          LINT=$(fm "$CONTRACT" verifyLint); TEST=$(fm "$CONTRACT" verifyTest)
          if [ -n "$LINT" ]; then
            echo "re-verify lint: $LINT"
            sh -c "$LINT" || { echo "ERROR: result says DONE but verifyLint fails (lying handoff)" >&2; exit 1; }
          fi
          if [ -n "$TEST" ]; then
            echo "re-verify test: $TEST"
            sh -c "$TEST" || { echo "ERROR: result says DONE but verifyTest fails (lying handoff)" >&2; exit 1; }
          fi
          echo "DONE re-verified"
          ;;
        *)
          echo "ERROR: result file has invalid status '$ST' (must be DONE|BLOCKED)" >&2; exit 1
          ;;
      esac

  # --------------------------------------------------------------------------
  # 4) Sink — one plain parseable line: STATUS RESULT_PATH (R22)
  # --------------------------------------------------------------------------
  - id: report
    depends_on: [verify-result]
    always_run: true
    timeout: 15000
    bash: |
      set -u
      fm() { sed -n '/^---$/,/^---$/p' "$1" | sed -n "s/^$2:[[:space:]]*//p" | head -1 | sed -e 's/^["'\'']//' -e 's/["'\'']$//'; }
      RESULT=$(fm "$ARGUMENTS" resultPath)
      printf '%s %s\n' "$(fm "$RESULT" status)" "$RESULT"
