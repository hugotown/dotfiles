    depends_on: [g-review-1, g-review-2, g-review-3, g-review-4, g-review-5, g-review-6, g-review-7]
    timeout: 60000
    bash: |
      set -e
      D="$ARTIFACTS_DIR"
      echo "regate-g (cascarón): 7 slot handoffs + 7 reviews present · no slot BLOCKED · no review REWORK."
      for i in 1 2 3 4 5 6 7; do
        for f in "g-slot-$i" "g-review-$i"; do
          [ -f "$D/handoffs/$f.xml" ] || { echo "regate-g FAIL — missing handoff: $f.xml"; exit 1; }
        done
        if grep -qiE '<status>[[:space:]]*BLOCKED[[:space:]]*</status>' "$D/handoffs/g-slot-$i.xml"; then
          echo "regate-g FAIL — g-slot-$i exhausted its rounds (BLOCKED) → escalate"; exit 1
        fi
        if grep -qiE '<verdict>[[:space:]]*REWORK[[:space:]]*</verdict>' "$D/handoffs/g-review-$i.xml"; then
          echo "regate-g FAIL — g-review-$i verdict REWORK (Crit survived) → escalate"; exit 1
        fi
      done
      mkdir -p "$D/checkpoints"
      printf 'g — 7-slot loop handoffs + reviews validated (cascarón)\n' > "$D/checkpoints/g.checkpoint.md"
