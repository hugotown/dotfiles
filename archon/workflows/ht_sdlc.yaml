  - id: refreeze-h
    depends_on: [h-review-1, h-review-2, h-review-3, h-review-4, h-review-5, h-review-6, h-review-7]
    timeout: 60000
    bash: |
      set -e
      D="$ARTIFACTS_DIR"
      echo "refreeze-h (cascarón): 7 slot handoffs + 7 reviews present · no slot BLOCKED · no review REWORK."
      for i in 1 2 3 4 5 6 7; do
        for f in "h-slot-$i" "h-review-$i"; do
          [ -f "$D/handoffs/$f.xml" ] || { echo "refreeze-h FAIL — missing handoff: $f.xml"; exit 1; }
        done
        if grep -qiE '<status>[[:space:]]*BLOCKED[[:space:]]*</status>' "$D/handoffs/h-slot-$i.xml"; then
          echo "refreeze-h FAIL — h-slot-$i exhausted its rounds (BLOCKED) → escalate"; exit 1
        fi
        if grep -qiE '<verdict>[[:space:]]*REWORK[[:space:]]*</verdict>' "$D/handoffs/h-review-$i.xml"; then
          echo "refreeze-h FAIL — h-review-$i verdict REWORK (Crit survived) → escalate"; exit 1
        fi
      done
      mkdir -p "$D/checkpoints"
      printf 'h — 7-slot loop handoffs + reviews validated (cascarón)\n' > "$D/checkpoints/h.checkpoint.md"
      echo "CHECKPOINT h written 😉"


