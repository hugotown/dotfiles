          <file path="$ARTIFACTS_DIR/handoffs/i-slot-6.xml">
            <template>
            <handoff phase="I" role="REFACTOR WORKER" slot="6" round="…">
              <contracts_covered>…</contracts_covered>  <!-- your slot ids, or 'none' -->
              <diff_scope>…</diff_scope>
              <evidence>…</evidence>  <!-- suite still GREEN -->
              <blocked_reason>…</blocked_reason>  <!-- what still fails; drives the next round -->
              <status>DONE</status>  <!-- DONE only when clean; else BLOCKED -->
            </handoff>
            </template>
          </file>
          <stdout_line note="STDOUT only, NOT part of the file — separate from the SLOT_CLEAN token, which still goes on its own final line when DONE">RECEIVED · REFACTOR WORKER slot 6 · i-slot-6.xml written 😉</stdout_line>
        </outputs>
      until: SLOT_CLEAN
      max_iterations: 3
      fresh_context: true
      interactive: false

  - id: i-review-6
    depends_on: [i-slot-6]
    context: fresh
    model: minimax/MiniMax-M3
    output_type: review
    prompt: |
      <objective>
      You are the FINAL INDEPENDENT REVIEWER for phase I slot 6 (fresh eyes). The loop already
      self-corrected up to 3 rounds; you verify its result independently. No edits, no commit.
      </objective>

      <context>
        <input>all $ARTIFACTS_DIR/contracts/*/contract_*.xml</input>
        <input>$ARTIFACTS_DIR/handoffs/i-slot-6.xml — the slot's final self-corrected result</input>
      </context>

      <workflow>
        <step_1>Read the slot 6 final handoff + the contracts it covers (or "nothing for this slot").</step_1>
        <step_2>Verify independently, JUDGED AGAINST THIS PHASE'S GOAL — not the finished product. Classify findings Crit/Imp/Minor. A Crit is ONLY a defect that THIS phase is responsible for: in the STUBS phase a file only needs to compile/typecheck, match the contract's public interface, and carry its RED sentinel — its runtime behavior is INTENTIONALLY incomplete/failing and is completed & verified in the implementation phase, so NEVER REWORK a stub for wrong or missing behavior; in the TESTS phase, tests only need to exist and fail RED against stubs; in the implementation / hardening / edge phases, behavior correctness IS in scope. Decide the verdict: PASS if no IN-SCOPE blocking issue survived; REWORK only if a real IN-SCOPE Crit remains (this escalates — the autonomous rounds are already spent).</step_2>
      </workflow>

      <constraints>
        <rule>You do NOT edit or commit. Files only, no structured output. All artifacts/code/comments in English.</rule>
      </constraints>

      <acceptance_criteria>
        <criterion>i-review-6.xml written with findings and a verdict element (PASS or REWORK).</criterion>
      </acceptance_criteria>

      <outputs>
        <file path="$ARTIFACTS_DIR/handoffs/i-review-6.xml">
          <template>
      <review phase="I" target="i-slot-6" slot="6">
        <findings severity="…">…</findings>  <!-- or <findings>clean</findings> -->
        <verdict>PASS</verdict>  <!-- PASS | REWORK — REWORK = a blocking Crit survived; escalates -->
      </review>
          </template>
        </file>
        <stdout_line note="STDOUT only, NOT part of the file">RECEIVED: i-slot-6 · FINAL REVIEWER(I) slot 6 · i-review-6.xml written (verdict) 😉</stdout_line>
      </outputs>

  - id: i-slot-7
    depends_on: [refreeze-h]
    context: fresh
    model: minimax/MiniMax-M3
    output_type: handoff
    loop:
      prompt: |
        <objective>
        You are REFACTOR WORKER slot 7/7 (phase I, self-correcting loop, up to 3 rounds). Produce and
        self-correct the contracts assigned to YOUR slot until they pass — or, only after exhausting the
        rounds, escalate as BLOCKED. A human is involved ONLY when the autonomous rounds are used up.
        </objective>

        <context>
          <input>$ARTIFACTS_DIR/handoffs/execution.xml — slot_assignment slot id="7": the contracts YOU own</input>
          <input>all $ARTIFACTS_DIR/contracts/*/contract_*.xml</input>
          <input>all $ARTIFACTS_DIR/handoffs/h-review-*.xml</input>
          <input>$LOOP_PREV_OUTPUT — your previous round's result (what still failed); empty on round 1</input>
        </context>

        <workflow>
          <step_1>Read execution.xml slot 7. If your slot is empty, write the handoff with status DONE ("nothing for this slot") and print the literal token SLOT_CLEAN as the FINAL line of your output, alone on its own line (this is the ONLY signal that ends the loop — forgetting it discards your work and wastes a round).</step_1>
          <step_2>Read $LOOP_PREV_OUTPUT to see what failed last round (round 1: nothing). Refactor your assigned files for clarity WITHOUT changing behavior or shared signatures; the suite stays GREEN for your assigned contracts, fixing precisely what the previous round left broken — build on it, do not start over.</step_2>
          <step_3>Self-review (verification-before-completion + code-review rigor, inline) and run the phase check (suite still GREEN — run PER FILE: YOUR OWN contracts' tests (their test paths from the contract master) plus typecheck/lint on YOUR files, using the VERIFIED-RUNNABLE commands in $ARTIFACTS_DIR/stack/ (test/lint/typecheck) scoped to your paths — actually RUN each one and leave ZERO lint and type errors on YOUR files (auto-fix/format with the repo's own fixer when it has one; otherwise adjust the code). GATE-E-GLOBAL later runs the SAME lint+typecheck across the whole repo, so any violation you leave here fails the run. NEVER run the full suite here — the full suite runs ONCE at the end (GATE E GLOBAL); running it from 7 parallel slots on the shared tree would clash).</step_3>
          <step_4>If your contracts are clean → write the handoff with status DONE and print the literal token SLOT_CLEAN as the FINAL line of your output, alone on its own line (this is the ONLY signal that ends the loop — forgetting it discards your work and wastes a round). If NOT clean → write the handoff with status BLOCKED describing EXACTLY what still fails (so next round fixes with information) and do NOT emit the token; the loop retries.</step_4>
        </workflow>

        <constraints>
          <rule>Touch ONLY the logical files of YOUR assigned contracts (singleton owner). Never commit. Files only, no structured output.</rule>
          <rule>Each round builds on the last — read $LOOP_PREV_OUTPUT and fix with information, never blindly.</rule>
          <rule>CONTEXT HYGIENE (critical — a single oversized read hard-fails this node with "context window exceeds limit"): read IN FULL only YOUR slot's own contracts; for other contracts read only the specific public_interface signature you consume, never all of them. NEVER cat/read an entire large file (lockfiles, generated migrations/build output, dependency or vendor directories, multi-thousand-line files) and NEVER dump full command output — always scope with line-ranges/grep and pipe verbose output through `tail -n 50` or `grep`.</rule>
          <rule>Emit the completion token ONLY when your contracts genuinely pass. All artifacts/code/comments in English.</rule>
        </constraints>

        <acceptance_criteria>
          <criterion>Emit the completion token only when your assigned contracts pass (refactored, GREEN). If the 3 rounds exhaust without passing, the last handoff stays status BLOCKED and escalates via the gate.</criterion>
        </acceptance_criteria>

        <outputs>
          <file path="$ARTIFACTS_DIR/handoffs/i-slot-7.xml">
            <template>
            <handoff phase="I" role="REFACTOR WORKER" slot="7" round="…">
              <contracts_covered>…</contracts_covered>  <!-- your slot ids, or 'none' -->
              <diff_scope>…</diff_scope>
              <evidence>…</evidence>  <!-- suite still GREEN -->
              <blocked_reason>…</blocked_reason>  <!-- what still fails; drives the next round -->
              <status>DONE</status>  <!-- DONE only when clean; else BLOCKED -->
            </handoff>
            </template>
          </file>
          <stdout_line note="STDOUT only, NOT part of the file — separate from the SLOT_CLEAN token, which still goes on its own final line when DONE">RECEIVED · REFACTOR WORKER slot 7 · i-slot-7.xml written 😉</stdout_line>
        </outputs>
      until: SLOT_CLEAN
      max_iterations: 3
      fresh_context: true
      interactive: false

  - id: i-review-7
    depends_on: [i-slot-7]
    context: fresh
    model: minimax/MiniMax-M3
    output_type: review
    prompt: |
      <objective>
      You are the FINAL INDEPENDENT REVIEWER for phase I slot 7 (fresh eyes). The loop already
      self-corrected up to 3 rounds; you verify its result independently. No edits, no commit.
      </objective>

      <context>
        <input>all $ARTIFACTS_DIR/contracts/*/contract_*.xml</input>
        <input>$ARTIFACTS_DIR/handoffs/i-slot-7.xml — the slot's final self-corrected result</input>
      </context>

      <workflow>
        <step_1>Read the slot 7 final handoff + the contracts it covers (or "nothing for this slot").</step_1>
        <step_2>Verify independently, JUDGED AGAINST THIS PHASE'S GOAL — not the finished product. Classify findings Crit/Imp/Minor. A Crit is ONLY a defect that THIS phase is responsible for: in the STUBS phase a file only needs to compile/typecheck, match the contract's public interface, and carry its RED sentinel — its runtime behavior is INTENTIONALLY incomplete/failing and is completed & verified in the implementation phase, so NEVER REWORK a stub for wrong or missing behavior; in the TESTS phase, tests only need to exist and fail RED against stubs; in the implementation / hardening / edge phases, behavior correctness IS in scope. Decide the verdict: PASS if no IN-SCOPE blocking issue survived; REWORK only if a real IN-SCOPE Crit remains (this escalates — the autonomous rounds are already spent).</step_2>
      </workflow>

      <constraints>
        <rule>You do NOT edit or commit. Files only, no structured output. All artifacts/code/comments in English.</rule>
      </constraints>

      <acceptance_criteria>
        <criterion>i-review-7.xml written with findings and a verdict element (PASS or REWORK).</criterion>
      </acceptance_criteria>

      <outputs>
        <file path="$ARTIFACTS_DIR/handoffs/i-review-7.xml">
          <template>
      <review phase="I" target="i-slot-7" slot="7">
        <findings severity="…">…</findings>  <!-- or <findings>clean</findings> -->
        <verdict>PASS</verdict>  <!-- PASS | REWORK — REWORK = a blocking Crit survived; escalates -->
      </review>
          </template>
        </file>
        <stdout_line note="STDOUT only, NOT part of the file">RECEIVED: i-slot-7 · FINAL REVIEWER(I) slot 7 · i-review-7.xml written (verdict) 😉</stdout_line>
      </outputs>

  # GATE E GLOBAL — 7 loop-slots self-corrected + final reviews; escalate only if a slot is BLOCKED
  # (rounds exhausted) or a reviewer says REWORK (a Crit survived). Cascarón: no build commands.
  - id: gate-e-global
    depends_on: [i-review-1, i-review-2, i-review-3, i-review-4, i-review-5, i-review-6, i-review-7]
    timeout: 60000
    bash: |
      set -e
      D="$ARTIFACTS_DIR"
      echo "gate-e-global (cascarón): 7 slot handoffs + 7 reviews present · no slot BLOCKED · no review REWORK."
      [ -f "$ARTIFACTS_DIR/checkpoints/h.checkpoint.md" ] || { echo "gate-e-global FAIL — missing $ARTIFACTS_DIR/checkpoints/h.checkpoint.md"; exit 1; }
      for i in 1 2 3 4 5 6 7; do
        for f in "i-slot-$i" "i-review-$i"; do
          [ -f "$D/handoffs/$f.xml" ] || { echo "gate-e-global FAIL — missing handoff: $f.xml"; exit 1; }
        done
        if grep -qiE '<status>[[:space:]]*BLOCKED[[:space:]]*</status>' "$D/handoffs/i-slot-$i.xml"; then
          echo "gate-e-global FAIL — i-slot-$i exhausted its rounds (BLOCKED) → escalate"; exit 1
        fi
        if grep -qiE '<verdict>[[:space:]]*REWORK[[:space:]]*</verdict>' "$D/handoffs/i-review-$i.xml"; then
          echo "gate-e-global FAIL — i-review-$i verdict REWORK (Crit survived) → escalate"; exit 1
        fi
      done
      # REAL check — the ONLY full-suite run of the method (R7): typecheck + FULL tests GREEN + lint
      if [ -s "$D/stack/typecheck.cmd" ]; then echo "  running typecheck"; bash "$D/stack/typecheck.cmd" || { echo "GATE FAIL — typecheck failed"; exit 1; }; else echo "  typecheck: NOT CONFIGURED — skip"; fi
      if [ -s "$D/stack/test.cmd" ]; then echo "  running full test suite (expect GREEN)"; bash "$D/stack/test.cmd" || { echo "GATE FAIL — full suite not GREEN"; exit 1; }; else echo "  full test suite (expect GREEN): NOT CONFIGURED — skip"; fi
      if [ -s "$D/stack/lint.cmd" ]; then echo "  running lint"; bash "$D/stack/lint.cmd" || { echo "GATE FAIL — lint failed"; exit 1; }; else echo "  lint: NOT CONFIGURED — skip"; fi
      mkdir -p "$D/checkpoints"
      printf 'e-global — 7-slot loop handoffs + reviews validated (cascarón)\n' > "$D/checkpoints/e-global.checkpoint.md"
      echo "CHECKPOINT e-global written 😉"


  - id: cross-file-review
    depends_on: [gate-e-global]
    context: fresh
    model: minimax/MiniMax-M3
    output_type: cross-file-review
    prompt: |
      <objective>
      You are the CROSS-FILE REVIEWER (fresh, strong model) — the final GATE E review.
      Judge the whole integrated change across contracts for coherence and contract
      mismatches; a mismatch → recommend TRIAGE/partial re-freeze.
      </objective>

      <context>
        <input>all $ARTIFACTS_DIR/contracts/*/contract_*.xml</input>
        <input>all $ARTIFACTS_DIR/handoffs/i-slot-*.xml — the 7 refactor slots</input>
        <input>$ARTIFACTS_DIR/checkpoints/e-global.checkpoint.md</input>
      </context>

      <workflow>
        <step_1>Read every CONTRACT MASTER + the final 7 i-slot handoffs + the e-global checkpoint.</step_1>
        <step_2>Review the integrated change across files for coherence and contract mismatches.</step_2>
        <step_3>Decide the verdict: PASS if the integrated change is coherent, else TRIAGE-NEEDED (with a re-freeze recommendation).</step_3>
      </workflow>

      <constraints>
        <rule>You do NOT edit or commit. Files only, no structured output.</rule>
        <rule>Communicate with the human in Spanish; all artifacts/code/comments in English.</rule>
      </constraints>

      <acceptance_criteria>
        <criterion>cross-file-review.xml exists with findings + contract mismatches AND ends with exactly one `verdict:` line (PASS or TRIAGE-NEEDED) as its LAST line — the final gate greps it.</criterion>
      </acceptance_criteria>

      <outputs>
        <file path="$ARTIFACTS_DIR/handoffs/cross-file-review.xml">
          <template>
      <cross_file_review>
        <findings>…</findings>
        <contract_mismatches>…</contract_mismatches>  <!-- any → re-freeze recommendation -->
        <verdict>PASS</verdict>  <!-- write exactly ONE: PASS | TRIAGE-NEEDED -->
      </cross_file_review>
          </template>
        </file>
        <stdout_line note="STDOUT only, NOT part of the file">RECEIVED: contracts + i-slots + e-global · CROSS-FILE REVIEW · cross-file-review.xml written (verdict) 😉</stdout_line>
      </outputs>

  # ==========================================================================
  # STEP 11 — FINAL COMMIT: the ONLY git commit of the whole method (R17). No
  # agent node ever commits; the orchestrator does it here after all gates pass.
  # ==========================================================================
  - id: final-commit
    depends_on: [cross-file-review]
    timeout: 120000
    bash: |
      set -e
      D="$ARTIFACTS_DIR"
      echo "FINAL COMMIT (R17): the ONLY git commit of the method."
      [ -f "$D/handoffs/cross-file-review.xml" ] || { echo "FAIL — missing cross-file-review.xml"; exit 1; }
      # Only commit when the cross-file review is PASS; TRIAGE-NEEDED aborts (R7/R13).
      if grep -qiE '<verdict>[[:space:]]*TRIAGE-NEEDED[[:space:]]*</verdict>' "$D/handoffs/cross-file-review.xml"; then
        echo "FINAL COMMIT ABORT — cross-file review needs triage (R7/R13)"; exit 1
      fi
      if ! grep -qiE '<verdict>[[:space:]]*PASS[[:space:]]*</verdict>' "$D/handoffs/cross-file-review.xml"; then
        echo "FINAL COMMIT FAIL — no 'verdict: PASS' line in cross-file-review.xml"; exit 1
      fi
      # Single commit in the real working tree (worktree disabled by design).
      git add -A
      git commit -m "ht_sldc: implement approved spec (single R17 commit)" || echo "  (nothing to commit)"
      mkdir -p "$D/checkpoints"
      printf 'final-commit done — single R17 commit\n' > "$D/checkpoints/final-commit.marker.md"
      echo "MARKER: $D/checkpoints/final-commit.marker.md 😉"

  # ==========================================================================
  # STEP 12 — FINISHING (HUMAN #3 — R14): MAIN + human decide MERGE/PR/KEEP/DISCARD
  # ==========================================================================
  - id: finishing
    depends_on: [final-commit]
    context: fresh
    model: minimax/MiniMax-M3
    output_type: finishing
    prompt: |
      <objective>
      You are MAIN running FINISHING (human intervention #3). Summarize the
      integration options for the human to decide MERGE | PR | KEEP | DISCARD.
      </objective>

      <context>
        <input>$ARTIFACTS_DIR/handoffs/cross-file-review.xml</input>
        <input>$ARTIFACTS_DIR/checkpoints/final-commit.marker.md</input>
      </context>

      <workflow>
        <step_1>Read the cross-file review + the final-commit marker.</step_1>
        <step_2>Weigh the options (MERGE | PR | KEEP | DISCARD) and pick a recommendation.</step_2>
        <step_3>Present the summary + recommendation to the human in Spanish and await the decision.</step_3>
      </workflow>

      <constraints>
        <rule>The single commit already happened at final-commit; you do NOT commit again.</rule>
        <rule>Files only, no structured output.</rule>
        <rule>Communicate with the human in Spanish; all artifacts/code/comments in English.</rule>
      </constraints>

      <acceptance_criteria>
        <criterion>finishing.xml exists summarizing MERGE | PR | KEEP | DISCARD with a recommendation, and the human has been presented the summary in Spanish and asked to decide.</criterion>
      </acceptance_criteria>

      <outputs>
        <file path="$ARTIFACTS_DIR/handoffs/finishing.xml">
          <template>
      <finishing>
        <options>…</options>  <!-- MERGE | PR | KEEP | DISCARD -->
        <recommendation>…</recommendation>
      </finishing>
          </template>
        </file>
        <stdout_line note="print in Spanish a short summary + the recommended option for the human, ending with this line">RECEIVED: cross-file-review + marker · FINISHING · finishing.xml written, awaiting human decision 😉</stdout_line>
      </outputs>

  - id: human-finishing-decision
    depends_on: [finishing]
    approval:
      message: "FINISHING (R14 #3): revisa $ARTIFACTS_DIR/handoffs/finishing.xml y decide MERGE | PR | KEEP | DISCARD."
      capture_response: true
