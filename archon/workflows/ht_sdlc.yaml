      echo "regate-f (cascarón): 7 slot handoffs + 7 reviews present · no slot BLOCKED · no review REWORK."
      for i in 1 2 3 4 5 6 7; do
        for f in "f-slot-$i" "f-review-$i"; do
          [ -f "$D/handoffs/$f.xml" ] || { echo "regate-f FAIL — missing handoff: $f.xml"; exit 1; }
        done
