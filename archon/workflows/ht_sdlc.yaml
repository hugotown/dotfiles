    depends_on: [d-review-1, d-review-2, d-review-3, d-review-4, d-review-5, d-review-6, d-review-7]
    timeout: 60000
    bash: |
      set -e
      D="$ARTIFACTS_DIR"
      echo "gate-e-d (cascarón): 7 slot handoffs + 7 reviews present · no slot BLOCKED · no review REWORK."
      for i in 1 2 3 4 5 6 7; do
        for f in "d-slot-$i" "d-review-$i"; do
          [ -f "$D/handoffs/$f.xml" ] || { echo "gate-e-d FAIL — missing handoff: $f.xml"; exit 1; }
        done
        if grep -qiE '<status>[[:space:]]*BLOCKED[[:space:]]*</status>' "$D/handoffs/d-slot-$i.xml"; then
          echo "gate-e-d FAIL — d-slot-$i exhausted its rounds (BLOCKED) → escalate"; exit 1
        fi
        if grep -qiE '<verdict>[[:space:]]*REWORK[[:space:]]*</verdict>' "$D/handoffs/d-review-$i.xml"; then
          echo "gate-e-d FAIL — d-review-$i verdict REWORK (Crit survived) → escalate"; exit 1
        fi
      done
      mkdir -p "$D/checkpoints"
      printf 'e-d — 7-slot loop handoffs + reviews validated (cascarón)\n' > "$D/checkpoints/e-d.checkpoint.md"
      echo "CHECKPOINT e-d written 😉"


