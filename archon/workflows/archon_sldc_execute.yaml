# ============================================================================
# archon_sldc_execute ‚Äî STAGE: runbook steps 5‚Äì11 (stubs ‚Üí gates ‚Üí topology
# execution ‚Üí GATE E global ‚Üí THE ONLY COMMIT)
#
# Suite: archon_sldc_*. Contract (D2): $ARGUMENTS = path to
# .archon/sldc/planning/planning-handoff.md (the plan stage output; carries
# contractsDir, topologyPath and every gate command ‚Äî D3).
#
# Composition (D10): this stage is a DETERMINISTIC conductor ‚Äî bash nodes
# generate every phase manifest/handoff up front, then invoke the atomic
# sub-workflows as NESTED runs (children declare worktree.enabled: false, so
# they run in THIS checkout):
#   step 5   archon_sldc_batch          A-STUBS (global barrier, R2)
#   step 6   archon_sldc_gate_contract_review   (R18; FAIL ‚Üí HALT via cancel)
#   step 7v  archon_sldc_vertical       (topology VERTICAL)
#   step 7h  archon_sldc_batch √ó4 + archon_sldc_triage + archon_sldc_batch
#            (B-TESTS ‚Üí D-IMPL ‚Üí F-HARDENING ‚Üí G-EDGE ‚Üí H-TRIAGE ‚Üí I-REFACTOR)
#   step 10  archon_sldc_gate_e_global  (R7; FAIL ‚Üí failed run, resumable)
#   step 11  final-commit ‚Äî THE ONLY git commit of the method (R17),
#            excluding .archon/ and .opencode/ (D16)
#
# Sink line: "COMMITTED <short-sha>" (R22).
# Standalone run:
#   archon workflow run archon_sldc_execute ".archon/sldc/planning/planning-handoff.md"
# ============================================================================

name: archon_sldc_execute
description: >
  Execution stage of the archon_sldc suite (resolutive method steps 5-11):
  deterministically generates every phase manifest from the frozen plan,
  runs the global STUBS barrier, the R18 contract-review gate (weak
  contracts HALT the run), then the topology branch ‚Äî vertical slices or
  horizontal file-by-phase batches with triage ‚Äî closes with the global
  GATE E (suite + lint + cross-file review) and makes the method's single
  git commit. Workers, reviewers and fixers never commit; this stage's
  final node is the only one that does (R17).

provider: opencode
model: programming-9
worktree:
  enabled: false

nodes:
  # --------------------------------------------------------------------------
  # 1) Fail-fast deterministic input validation
  # --------------------------------------------------------------------------
  - id: validate-input
    timeout: 30000
    bash: |
      set -u
      PH="$ARGUMENTS"
      fm() { sed -n '/^---$/,/^---$/p' "$1" | sed -n "s/^$2:[[:space:]]*//p" | head -1 | sed -e 's/^["'\'']//' -e 's/["'\'']$//'; }
      [ -n "$PH" ] || { echo "ERROR: \$ARGUMENTS must be the path to planning-handoff.md" >&2; exit 1; }
      [ -f "$PH" ] || { echo "ERROR: planning handoff not found: $PH" >&2; exit 1; }
      CD=$(fm "$PH" contractsDir); TP=$(fm "$PH" topologyPath)
      GR=$(fm "$PH" gateRed); GS=$(fm "$PH" gateSuite)
      for kv in "contractsDir=$CD" "topologyPath=$TP" "gateRed=$GR" "gateSuite=$GS"; do
        [ -n "${kv#*=}" ] || { echo "ERROR: planning handoff missing key: ${kv%%=*}" >&2; exit 1; }
      done
      [ -d "$CD" ] || { echo "ERROR: contractsDir not found: $CD" >&2; exit 1; }
      ls "$CD"/*.contract.md >/dev/null 2>&1 || { echo "ERROR: no CONTRACT MASTERs in $CD" >&2; exit 1; }
      [ -f "$TP" ] || { echo "ERROR: topology decision file not found: $TP" >&2; exit 1; }
      echo "plan=$PH contracts=$CD"

  # --------------------------------------------------------------------------
  # 2) Deterministic generation of EVERY phase manifest and gate request
  #    (R20 matrix materialized as data; contract `phases:` filters apply)
  # --------------------------------------------------------------------------
  - id: gen-handoffs
    depends_on: [validate-input]
    timeout: 60000
    bash: |
      set -u
      PH="$ARGUMENTS"
      fm() { sed -n '/^---$/,/^---$/p' "$1" | sed -n "s/^$2:[[:space:]]*//p" | head -1 | sed -e 's/^["'\'']//' -e 's/["'\'']$//'; }
      fml() { sed -n '/^---$/,/^---$/p' "$1" | awk -v k="$2" '$0 ~ "^"k":" {f=1; next} f && /^---$/ {exit} f && /^[[:space:]]*-[[:space:]]+[^[:space:]]/ {sub(/^[[:space:]]*-[[:space:]]+/,""); print; next} f {exit}'; }
      CD=$(fm "$PH" contractsDir)
      GSTUBS=$(fm "$PH" gateStubs); GRED=$(fm "$PH" gateRed)
      GSUITE=$(fm "$PH" gateSuite); GLINT=$(fm "$PH" gateLint)
      ROOT=.archon/sldc
      mkdir -p "$ROOT/batches" "$ROOT/gates" "$ROOT/execution/vertical" "$ROOT/execution/H-TRIAGE"

      for PHASE in A-STUBS B-TESTS D-IMPL F-HARDENING G-EDGE I-REFACTOR; do
        RD="$ROOT/execution/$PHASE"; mkdir -p "$RD"
        case "$PHASE" in
          A-STUBS) GATE="$GSTUBS" ;;
          B-TESTS) GATE="$GRED" ;;
          *)       GATE="$GSUITE" ;;
        esac
        MF="$ROOT/batches/$PHASE.batch.md"
        {
          echo "---"
          echo "phase: $PHASE"
          echo "resultsDir: $RD"
          echo "gateSuite: \"$GATE\""
          echo "gateLint: \"$GLINT\""
          echo "checkpointPath: $RD/checkpoint.md"
          echo "waveSize: 7"
          echo "tasks:"
          for C in "$CD"/*.contract.md; do
            SLUG=$(fm "$C" contractId)
            ELIG=$(fml "$C" phases)
            if [ -n "$ELIG" ]; then
              case " $(printf '%s ' $ELIG)" in *" $PHASE "*) : ;; *) continue ;; esac
            fi
            T="$RD/$SLUG.$PHASE.task.md"
            if [ ! -f "$T" ]; then
              {
                echo "---"
                echo "contractPath: $C"
                echo "phase: $PHASE"
                echo "resultPath: $RD/$SLUG.$PHASE.result.md"
                echo "progressPath: $RD/$SLUG.$PHASE.progress.md"
                echo "attempt: 1"
                echo "---"
              } > "$T"
            fi
            echo "- $T"
          done
          echo "---" >/dev/null
        } > "$MF"
        echo "manifest: $MF"
      done

      {
        echo "---"
        echo "planningHandoff: $PH"
        echo "contractsDir: $CD"
        echo "resultsDir: $ROOT/execution/vertical"
        echo "checkpointPath: $ROOT/execution/vertical/checkpoint.md"
        echo "gateSuite: \"$GSUITE\""
        echo "gateLint: \"$GLINT\""
        echo "waveSize: 7"
        echo "---"
      } > "$ROOT/batches/vertical.vertical-request.md"

      {
        echo "---"
        echo "contractsDir: $CD"
        echo "stubsResultsDir: $ROOT/execution/A-STUBS"
        echo "reviewPath: $ROOT/gates/contract-review.md"
        echo "verdictPath: $ROOT/gates/contract-review-verdict.txt"
        echo "---"
      } > "$ROOT/gates/contract-review.gate-request.md"

      {
        echo "---"
        echo "contractsDir: $CD"
        echo "executionDir: $ROOT/execution"
        echo "triagePath: $ROOT/execution/H-TRIAGE/triage.md"
        echo "resultsDir: $ROOT/execution/H-TRIAGE"
        echo "checkpointPath: $ROOT/execution/H-TRIAGE/checkpoint.md"
        echo "gateSuite: \"$GSUITE\""
        echo "gateLint: \"$GLINT\""
        echo "---"
      } > "$ROOT/batches/H-TRIAGE.triage-request.md"

      {
        echo "---"
        echo "gateSuite: \"$GSUITE\""
        echo "gateLint: \"$GLINT\""
        echo "contractsDir: $CD"
        echo "executionDir: $ROOT/execution"
        echo "reviewPath: $ROOT/gates/gate-e-global.md"
        echo "verdictPath: $ROOT/gates/gate-e-global-verdict.txt"
        echo "---"
      } > "$ROOT/gates/gate-e-global.gate-request.md"
      echo "handoffs generated under $ROOT/{batches,gates,execution}"

  # --------------------------------------------------------------------------
  # Step 5 ‚Äî Batch A: STUBS global barrier (R2), nested atomic batch
  # --------------------------------------------------------------------------
  - id: run-batch-a
    depends_on: [gen-handoffs]
    timeout: 14400000
    bash: |
      archon workflow run archon_sldc_batch ".archon/sldc/batches/A-STUBS.batch.md"

  # --------------------------------------------------------------------------
  # Step 6 ‚Äî gate-contract-review (R18): nested gate; verdict read fail-closed
  # --------------------------------------------------------------------------
  - id: run-gate-contracts
    depends_on: [run-batch-a]
    timeout: 7200000
    bash: |
      # D14: the gate exits non-zero on FAIL; the verdict FILE is authoritative
      archon workflow run archon_sldc_gate_contract_review ".archon/sldc/gates/contract-review.gate-request.md" || true
      echo "gate run finished (verdict is read from the file, fail-closed)"

  - id: read-contract-verdict
    depends_on: [run-gate-contracts]
    always_run: true
    timeout: 15000
    bash: |
      v=$(cat ".archon/sldc/gates/contract-review-verdict.txt" 2>/dev/null | tr -d '[:space:]')
      case "$v" in
        PASS|FAIL) printf '%s' "$v" ;;
        *)
          echo "WARNING: contract-review verdict missing/invalid (got '$v') ‚Äî treating as FAIL" >&2
          printf 'FAIL'
          ;;
      esac

  - id: halt-on-weak-contracts
    depends_on: [read-contract-verdict]
    when: "$read-contract-verdict.output != 'PASS'"
    cancel: >
      HALT (R18): gate-contract-review failed ‚Äî contracts are not safe to
      build on. See .archon/sldc/gates/contract-review.md, repair the
      contracts or the stubs, and start a new run. next.allowed: false.

  # --------------------------------------------------------------------------
  # Topology decision reader (R8) ‚Äî deterministic, fail-fast
  # --------------------------------------------------------------------------
  - id: read-topology
    depends_on: [validate-input]
    always_run: true
    timeout: 15000
    bash: |
      set -u
      fm() { sed -n '/^---$/,/^---$/p' "$1" | sed -n "s/^$2:[[:space:]]*//p" | head -1 | sed -e 's/^["'\'']//' -e 's/["'\'']$//'; }
      TP=$(fm "$ARGUMENTS" topologyPath)
      v=$(cat "$TP" 2>/dev/null | tr -d '[:space:]')
      case "$v" in
        VERTICAL|HORIZONTAL) printf '%s' "$v" ;;
        *) echo "ERROR: $TP must contain exactly VERTICAL or HORIZONTAL (got: '$v')" >&2; exit 1 ;;
      esac

  # --------------------------------------------------------------------------
  # Step 7v ‚Äî VERTICAL topology (nested atomic stage)
  # --------------------------------------------------------------------------
  - id: run-vertical
    depends_on: [read-contract-verdict, read-topology]
    when: "$read-contract-verdict.output == 'PASS' && $read-topology.output == 'VERTICAL'"
    timeout: 21600000
    bash: |
      archon workflow run archon_sldc_vertical ".archon/sldc/batches/vertical.vertical-request.md"

  # --------------------------------------------------------------------------
  # Step 7h ‚Äî HORIZONTAL topology: global barriers between batches (R20)
  # --------------------------------------------------------------------------
  - id: run-batch-b
    depends_on: [read-contract-verdict, read-topology]
    when: "$read-contract-verdict.output == 'PASS' && $read-topology.output == 'HORIZONTAL'"
    timeout: 14400000
    bash: |
      # GATE C semantics: this manifest's gateSuite is the plan's gateRed
      # (contractual RED, R6)
      archon workflow run archon_sldc_batch ".archon/sldc/batches/B-TESTS.batch.md"

  - id: run-batch-d
    depends_on: [run-batch-b]
    timeout: 14400000
    bash: |
      archon workflow run archon_sldc_batch ".archon/sldc/batches/D-IMPL.batch.md"

  - id: run-batch-f
    depends_on: [run-batch-d]
    timeout: 14400000
    bash: |
      archon workflow run archon_sldc_batch ".archon/sldc/batches/F-HARDENING.batch.md"

  - id: run-batch-g
    depends_on: [run-batch-f]
    timeout: 14400000
    bash: |
      archon workflow run archon_sldc_batch ".archon/sldc/batches/G-EDGE.batch.md"

  - id: run-triage-h
    depends_on: [run-batch-g]
    timeout: 14400000
    bash: |
      archon workflow run archon_sldc_triage ".archon/sldc/batches/H-TRIAGE.triage-request.md"

  - id: run-batch-i
    depends_on: [run-triage-h]
    timeout: 14400000
    bash: |
      archon workflow run archon_sldc_batch ".archon/sldc/batches/I-REFACTOR.batch.md"

  # --------------------------------------------------------------------------
  # Step 10 ‚Äî GATE E GLOBAL (R7): exactly one topology branch ran
  # --------------------------------------------------------------------------
  - id: run-gate-e
    depends_on: [run-vertical, run-batch-i]
    trigger_rule: none_failed_min_one_success
    timeout: 7200000
    bash: |
      archon workflow run archon_sldc_gate_e_global ".archon/sldc/gates/gate-e-global.gate-request.md" || true
      echo "gate run finished (verdict is read from the file, fail-closed)"

  - id: read-gate-e-verdict
    depends_on: [run-gate-e]
    always_run: true
    timeout: 15000
    bash: |
      v=$(cat ".archon/sldc/gates/gate-e-global-verdict.txt" 2>/dev/null | tr -d '[:space:]')
      case "$v" in
        PASS|FAIL) printf '%s' "$v" ;;
        *)
          echo "WARNING: gate-e-global verdict missing/invalid (got '$v') ‚Äî treating as FAIL" >&2
          printf 'FAIL'
          ;;
      esac

  - id: fail-on-gate-e-mismatch
    depends_on: [read-gate-e-verdict]
    when: "$read-gate-e-verdict.output != 'PASS'"
    timeout: 15000
    bash: |
      echo "GATE E GLOBAL FAILED (R7/R13): see .archon/sldc/gates/gate-e-global.md" >&2
      echo "Triage the mismatches (re-freeze if needed), then resume: archon workflow run archon_sldc_execute --resume" >&2
      exit 1

  # --------------------------------------------------------------------------
  # Step 11 ‚Äî THE ONLY git commit of the whole method (R17/R21, D16)
  # --------------------------------------------------------------------------
  - id: final-commit
    depends_on: [read-gate-e-verdict]
    when: "$read-gate-e-verdict.output == 'PASS'"
    timeout: 120000
    bash: |
      set -u
      # R17/R21 ‚Äî the single commit, made by this orchestrator after every
      # gate passed. Method telemetry stays out of the product (D16).
      git add -A -- . ':(exclude).archon' ':(exclude).opencode'
      if git diff --cached --quiet; then
        echo "WARNING: nothing to commit (working tree clean)"
      else
        git commit -m "feat(archon_sldc): run $WORKFLOW_ID ‚Äî all gates passed"
      fi
      git log -1 --oneline

  # --------------------------------------------------------------------------
  # Sink ‚Äî one plain parseable line (R22)
  # --------------------------------------------------------------------------
  - id: report
    depends_on: [final-commit]
    timeout: 15000
    bash: |
      printf 'COMMITTED %s\n' "$(git rev-parse --short HEAD)"
