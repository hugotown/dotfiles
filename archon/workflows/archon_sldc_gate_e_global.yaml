# ============================================================================
# archon_sldc_gate_e_global — GATE E GLOBAL (R7): suite GREEN + lint +
# cross-file review, inevitable for BOTH topologies
#
# Suite: archon_sldc_*. Contract (D2): $ARGUMENTS = path to a
# *.gate-request.md with flat frontmatter:
#   gateSuite, gateLint, contractsDir, executionDir, reviewPath, verdictPath
# Output: deterministic suite/lint evidence + cross-file review at reviewPath
# + ONE-WORD verdict file (PASS|FAIL) at verdictPath + sink line
# "PASS|FAIL PATH".
#
# D14: exits non-zero when the verdict is FAIL (or when suite/lint fail
# deterministically). Composing callers run it with `|| true`, re-read the
# verdict fail-closed, and route the failure themselves.
# ============================================================================

name: archon_sldc_gate_e_global
description: >
  GATE E GLOBAL of the archon_sldc suite (R7, both topologies): runs the
  project's full suite and lint together as deterministic evidence, then a
  fresh strong-model reviewer audits ACROSS files (contract mismatches,
  integration seams, dead stubs/sentinels, contract-code drift, R13) and
  writes a one-word PASS|FAIL verdict file (fail-closed). Exits non-zero on
  FAIL. Never modifies code, never commits.

provider: opencode
model: large
worktree:
  enabled: false

nodes:
  # --------------------------------------------------------------------------
  # 1) Fail-fast deterministic input validation
  # --------------------------------------------------------------------------
  - id: validate-request
    timeout: 15000
    bash: |
      set -u
      REQ="$ARGUMENTS"
      fm() { sed -n '/^---$/,/^---$/p' "$1" | sed -n "s/^$2:[[:space:]]*//p" | head -1 | sed -e 's/^["'\'']//' -e 's/["'\'']$//'; }
      [ -n "$REQ" ] || { echo "ERROR: \$ARGUMENTS must be the path to a *.gate-request.md handoff" >&2; exit 1; }
      [ -f "$REQ" ] || { echo "ERROR: gate request not found: $REQ" >&2; exit 1; }
      GS=$(fm "$REQ" gateSuite); CD=$(fm "$REQ" contractsDir); ED=$(fm "$REQ" executionDir)
      RP=$(fm "$REQ" reviewPath); VP=$(fm "$REQ" verdictPath)
      for kv in "gateSuite=$GS" "contractsDir=$CD" "executionDir=$ED" "reviewPath=$RP" "verdictPath=$VP"; do
        [ -n "${kv#*=}" ] || { echo "ERROR: request frontmatter missing required key: ${kv%%=*}" >&2; exit 1; }
      done
      [ -d "$CD" ] || { echo "ERROR: contractsDir not found: $CD" >&2; exit 1; }
      [ -d "$ED" ] || { echo "ERROR: executionDir not found: $ED" >&2; exit 1; }
      mkdir -p "$(dirname "$RP")" "$(dirname "$VP")"
      echo "suite+lint from handoff (D3); contracts=$CD execution=$ED"

  # --------------------------------------------------------------------------
  # 2) Deterministic evidence: full suite GREEN + lint, run TOGETHER (R7).
  #    A red suite fails this node outright — no semantic review can argue
  #    with a failing suite.
  # --------------------------------------------------------------------------
  - id: gate-e-check
    depends_on: [validate-request]
    always_run: true
    timeout: 1800000
    bash: |
      set -u
      REQ="$ARGUMENTS"
      fm() { sed -n '/^---$/,/^---$/p' "$1" | sed -n "s/^$2:[[:space:]]*//p" | head -1 | sed -e 's/^["'\'']//' -e 's/["'\'']$//'; }
      GS=$(fm "$REQ" gateSuite); GL=$(fm "$REQ" gateLint)
      echo "GATE-E-EVIDENCE-BEGIN"
      echo "suite: $GS"
      sh -c "$GS" 2>&1 | tail -40 || { echo "GATE E: suite FAILED" >&2; exit 1; }
      if [ -n "$GL" ]; then
        echo "lint: $GL"
        sh -c "$GL" 2>&1 | tail -40 || { echo "GATE E: lint FAILED" >&2; exit 1; }
      fi
      echo "GATE-E-EVIDENCE-END"

  # --------------------------------------------------------------------------
  # 3) Cross-file review — fresh, strong model (R7/R13)
  # --------------------------------------------------------------------------
  - id: cross-file-review
    depends_on: [gate-e-check]
    context: fresh
    output_type: sldc-gate-e-global
    prompt: |
      Role: GATE E GLOBAL — CROSS-FILE REVIEW of the archon_sldc suite (R7).
      Fresh context. You do NOT modify code and NEVER run git commands
      (R21); your verdict travels only as files (R22) and must cite
      evidence.

      SKILL INJECTION (R16 — mandatory, FIRST action): read COMPLETELY, with
      the Read tool:
      - ~/.config/opencode/skills/requesting-code-review/SKILL.md
      - ~/.config/opencode/skills/verification-before-completion/SKILL.md

      YOUR GATE REQUEST: $ARGUMENTS
      Read it: contractsDir (every contract), executionDir (every phase
      checkpoint/result/review), reviewPath, verdictPath.

      Deterministic evidence (suite GREEN + lint already verified by the
      engine): $gate-e-check.output

      REVIEW ACROSS FILES — what per-file reviews cannot see:
      - contract mismatches and drift between contracts and integrated code
        (R13)
      - integration seams between logical files (real consumption, not just
        compiling imports)
      - dead stubs/sentinels left behind by earlier phases
      - unresolved BLOCKED handoffs anywhere under executionDir

      WRITE, as FILES:
      1. reviewPath — .md, flat frontmatter (verdict: PASS|FAIL, critical:
         <n>, important: <n>, minor: <n>, producedBy:
         archon_sldc_gate_e_global, workflowRunId: $WORKFLOW_ID) and XML
         body <review><finding severity="..." file="..."/><summary/>
         </review>.
      2. verdictPath — the DECISION FILE: its ENTIRE content must be exactly
         one word, PASS or FAIL (uppercase, no quotes, no explanation).
      FAIL if ANY critical finding or ANY unresolved BLOCKED handoff exists.
      End with a short plain-text summary of the verdict and top findings.

  # --------------------------------------------------------------------------
  # 4) Deterministic verdict reader — fail-closed (missing/invalid = FAIL)
  # --------------------------------------------------------------------------
  - id: read-verdict
    depends_on: [cross-file-review]
    always_run: true
    timeout: 15000
    bash: |
      set -u
      fm() { sed -n '/^---$/,/^---$/p' "$1" | sed -n "s/^$2:[[:space:]]*//p" | head -1 | sed -e 's/^["'\'']//' -e 's/["'\'']$//'; }
      VP=$(fm "$ARGUMENTS" verdictPath)
      v=$(cat "$VP" 2>/dev/null | tr -d '[:space:]')
      case "$v" in
        PASS|FAIL) printf '%s' "$v" ;;
        *)
          echo "WARNING: verdict file missing or invalid at $VP (got: '$v') — treating as FAIL" >&2
          printf 'FAIL'
          ;;
      esac

  # --------------------------------------------------------------------------
  # 5) Sink — one plain line "PASS|FAIL REVIEW_PATH"; exit ≠0 on FAIL (D14)
  # --------------------------------------------------------------------------
  - id: report
    depends_on: [read-verdict]
    always_run: true
    timeout: 15000
    bash: |
      set -u
      fm() { sed -n '/^---$/,/^---$/p' "$1" | sed -n "s/^$2:[[:space:]]*//p" | head -1 | sed -e 's/^["'\'']//' -e 's/["'\'']$//'; }
      RP=$(fm "$ARGUMENTS" reviewPath)
      V=$read-verdict.output
      printf '%s %s\n' "$V" "$RP"
      if [ "$V" != "PASS" ]; then
        echo "GATE E GLOBAL FAILED (R7/R13): see $RP — triage the mismatches (re-freeze if needed) and re-run" >&2
        exit 1
      fi
