# ============================================================================
# archon_sldc_vertical — VERTICAL TOPOLOGY: slice execution (R4/R5/R6)
#
# Suite: archon_sldc_*. Contract (D2): $ARGUMENTS = path to a
# *.vertical-request.md with flat frontmatter:
#   planningHandoff, contractsDir, resultsDir, checkpointPath,
#   gateSuite, gateLint, waveSize
# Output: one VERTICAL-SLICE result + review per contract under resultsDir,
# checkpoint at checkpointPath + sink line "PASS PATH".
#
# INDEPENDENT slices (no behavior edges in the planning graph) run in
# parallel waves ≤ waveSize; COUPLED slices (R4) run in topological order of
# the behavior graph — never in free parallel. Each slice worker runs the
# full vertical cycle for its logical file: test → contractual RED via
# sentinel (R6) → implement → GREEN → harden → refactor. Deterministic gate:
# every slice DONE + APPROVED + gateSuite/gateLint exit 0. Nobody commits.
#
# Standalone run:
#   archon workflow run archon_sldc_vertical ".archon/sldc/batches/vertical.vertical-request.md"
# ============================================================================

name: archon_sldc_vertical
description: >
  Vertical topology execution of the archon_sldc suite: dispatches one fresh
  slice worker per contract (full TDD cycle per logical file), honoring the
  behavior dependency graph — independent slices in parallel waves (max
  waveSize, default 7), coupled slices in topological order (R4/R5). Reviews
  every slice, applies fix cycles, and completes only when the deterministic
  gate passes (all DONE + APPROVED + suite/lint green). Never commits.

provider: opencode
model: programming-9
worktree:
  enabled: false

nodes:
  # --------------------------------------------------------------------------
  # 1) Fail-fast deterministic input validation + task file generation
  # --------------------------------------------------------------------------
  - id: validate-request
    timeout: 30000
    bash: |
      set -u
      REQ="$ARGUMENTS"
      fm() { sed -n '/^---$/,/^---$/p' "$1" | sed -n "s/^$2:[[:space:]]*//p" | head -1 | sed -e 's/^["'\'']//' -e 's/["'\'']$//'; }
      [ -n "$REQ" ] || { echo "ERROR: \$ARGUMENTS must be the path to a *.vertical-request.md handoff" >&2; exit 1; }
      [ -f "$REQ" ] || { echo "ERROR: vertical request not found: $REQ" >&2; exit 1; }
      PH=$(fm "$REQ" planningHandoff); CD=$(fm "$REQ" contractsDir)
      RD=$(fm "$REQ" resultsDir); CP=$(fm "$REQ" checkpointPath)
      for kv in "planningHandoff=$PH" "contractsDir=$CD" "resultsDir=$RD" "checkpointPath=$CP"; do
        [ -n "${kv#*=}" ] || { echo "ERROR: request frontmatter missing required key: ${kv%%=*}" >&2; exit 1; }
      done
      [ -f "$PH" ] || { echo "ERROR: planningHandoff not found: $PH" >&2; exit 1; }
      [ -d "$CD" ] || { echo "ERROR: contractsDir not found: $CD" >&2; exit 1; }
      ls "$CD"/*.contract.md >/dev/null 2>&1 || { echo "ERROR: no *.contract.md in $CD" >&2; exit 1; }
      mkdir -p "$RD" "$(dirname "$CP")"
      # Deterministic task generation: one VERTICAL-SLICE task per contract
      N=0
      for C in "$CD"/*.contract.md; do
        SLUG=$(fm "$C" contractId)
        [ -n "$SLUG" ] || { echo "ERROR: contract $C missing contractId" >&2; exit 1; }
        T="$RD/$SLUG.VERTICAL-SLICE.task.md"
        if [ ! -f "$T" ]; then
          {
            echo "---"
            echo "contractPath: $C"
            echo "phase: VERTICAL-SLICE"
            echo "resultPath: $RD/$SLUG.VERTICAL-SLICE.result.md"
            echo "progressPath: $RD/$SLUG.VERTICAL-SLICE.progress.md"
            echo "attempt: 1"
            echo "---"
          } > "$T"
        fi
        N=$((N+1))
      done
      echo "slices=$N resultsDir=$RD"

  # --------------------------------------------------------------------------
  # 2) Materialize wave subagents (D11/D17)
  # --------------------------------------------------------------------------
  - id: materialize-agents
    depends_on: [validate-request]
    timeout: 15000
    bash: |
      set -u
      mkdir -p .opencode/agent .opencode/agents
      write_agent() {
        name="$1"; file=".opencode/agent/$name.md"
        cat > "$file"
        cp "$file" ".opencode/agents/$name.md"
      }
      write_agent sldc-contract-worker <<'AGENT'
      ---
      mode: subagent
      description: "Fresh TDD worker owning ONE logical file in ONE phase under its frozen contract (archon_sldc suite)"
      model: openai/gpt-5.6-terra
      ---
      You are a FRESH contract worker of the archon_sldc suite. Your task
      message gives you the path to ONE *.task.md handoff — that file is your
      entire assignment (contractPath, phase, resultPath, progressPath).

      SKILL INJECTION (R16 — mandatory, FIRST action): read COMPLETELY
      ~/.config/opencode/skills/test-driven-development/SKILL.md,
      ~/.config/opencode/skills/verification-before-completion/SKILL.md and
      ~/.config/opencode/skills/systematic-debugging/SKILL.md.

      Discipline: read the CONTRACT MASTER at contractPath; frozen public
      signatures are law (R13); only touch files inside allowedPaths (R12).
      For phase VERTICAL-SLICE run the FULL cycle for your logical file:
      test → contractual RED via the sentinel (R6: sentinel matches, zero
      non-sentinel failures) → implement → GREEN → harden → refactor.
      Hardening/refactor that would mutate frozen shared signatures must be
      reported BLOCKED, never applied (R13). Verify with the contract's
      verifyLint / verifyTest BEFORE claiming DONE. On errors: systematic
      debugging, max 3 bounded attempts per distinct error, then stop.

      ALWAYS terminate in state (R10): write resultPath as .md with flat
      frontmatter (contractId, phase, status: DONE|BLOCKED, attempts,
      producedBy: sldc-contract-worker) and XML body
      <result><diff/><evidence/><blocked reason=""/></result>.
      NEVER run any git command. Your last output line must be:
      RESULT <resultPath> <DONE|BLOCKED>
      AGENT
      write_agent sldc-file-reviewer <<'AGENT'
      ---
      mode: subagent
      description: "Reviewer of ONE logical file's phase result — findings file only, no code changes (archon_sldc suite)"
      model: minimax/MiniMax-M3
      ---
      You are a FILE REVIEWER of the archon_sldc suite. Your task message
      gives you: the contract path, the result path, the phase, and the
      review path where your findings go.

      SKILL INJECTION (R16 — mandatory, FIRST action): read COMPLETELY
      ~/.config/opencode/skills/requesting-code-review/SKILL.md.

      Review the ACTUAL code (targetFile + allowedPaths), not just the
      handoff's self-report, against the frozen contract and the full
      vertical cycle criteria (sentinel honored, tests meaningful, GREEN
      real, hardening/refactor within contract). You NEVER edit code and
      NEVER run git commands (R21). Write the review path as .md with flat
      frontmatter (contractId, phase, verdict: APPROVED|FINDINGS, critical:
      <n>, important: <n>, minor: <n>, producedBy: sldc-file-reviewer) and
      XML body <review><finding/><summary/></review>. verdict APPROVED
      requires zero critical AND zero important findings. Your last output
      line must be: REVIEW <reviewPath> <APPROVED|FINDINGS>
      AGENT
      write_agent sldc-file-fixer <<'AGENT'
      ---
      mode: subagent
      description: "Fixer applying review findings to ONE logical file under its frozen contract (archon_sldc suite)"
      model: openai/gpt-5.6-terra
      ---
      You are a FILE FIXER of the archon_sldc suite. Your task message gives
      you the path to ONE *.fix-request.md handoff (contractPath, phase,
      reviewPath, resultPath, progressPath).

      SKILL INJECTION (R16 — mandatory, FIRST action): read COMPLETELY
      ~/.config/opencode/skills/receiving-code-review/SKILL.md,
      ~/.config/opencode/skills/verification-before-completion/SKILL.md and
      ~/.config/opencode/skills/systematic-debugging/SKILL.md.

      Evaluate EACH finding on its technical merits (document rebuttals in
      the result body instead of blind-applying wrong findings). Fix ONLY
      inside allowedPaths (R12); frozen signatures stay law (R13). Re-run
      verifyLint / verifyTest before claiming DONE. ALWAYS terminate in
      state (R10): REWRITE resultPath (flat frontmatter: contractId, phase,
      status: DONE|BLOCKED, attempts, producedBy: sldc-file-fixer) with XML
      body <result><diff/><evidence/><rebuttals/><blocked reason=""/>
      </result>. NEVER run any git command. Your last output line must be:
      RESULT <resultPath> <DONE|BLOCKED>
      AGENT
      echo "materialized: sldc-contract-worker sldc-file-reviewer sldc-file-fixer"

  # --------------------------------------------------------------------------
  # 3) Slice dispatcher loop — graph-aware ordering (R4/R5), waves ≤ waveSize
  # --------------------------------------------------------------------------
  - id: vertical-loop
    depends_on: [materialize-agents]
    loop:
      prompt: |
        You are the VERTICAL SLICE DISPATCHER of the archon_sldc suite. You
        dispatch and verify — you NEVER write or fix production code (R12),
        NEVER run git commands (R21), and NEVER output the completion
        promise (the gate is deterministic).

        SKILL INJECTION (R16 — mandatory, FIRST action): read COMPLETELY:
        - ~/.config/opencode/skills/dispatching-parallel-agents/SKILL.md
        - ~/.config/opencode/skills/systematic-debugging/SKILL.md
        - ~/.config/opencode/skills/verification-before-completion/SKILL.md

        YOUR REQUEST: $ARGUMENTS
        Read it (planningHandoff, contractsDir, resultsDir, waveSize cap 7).
        Read the BEHAVIOR dependency graph in the planning handoff (R4:
        edges only where one file's GREEN needs another file's real GREEN).

        STATE FROM FILES (fresh context every iteration): the slice tasks
        are <resultsDir>/<slug>.VERTICAL-SLICE.task.md (already generated
        deterministically); results/reviews/fix-requests follow the same
        naming conventions as archon_sldc_batch. Append observations and
        dispatches to <resultsDir>/dispatch-log.md.

        ORDERING RULES (this is what makes you vertical):
        - INDEPENDENT slices (no behavior edges): dispatch freely in
          parallel waves of at most waveSize `sldc-contract-worker` calls.
        - COUPLED slices (R4): a slice is dispatched ONLY when every
          behavior dependency's slice already has a DONE result — otherwise
          it waits for a later round. Never dispatch a coupled group in free
          parallel; follow the topological order of the graph.

        PER ROUND:
        1. Dispatch eligible slices without valid results (rules above).
        2. Results without reviews → dispatch `sldc-file-reviewer` with
           contract/result/phase/review paths.
        3. Reviews with critical+important > 0 → write the fix-request
           handoff and dispatch `sldc-file-fixer`; delete the stale review
           after the fixer rewrites the result.
        4. BLOCKED results → systematic-debugging ANALYSIS only; max 2
           logged redispatches per slice with your diagnosis; otherwise the
           BLOCKED result stays as escalation data (R10/R11).
      until: VERTICAL_GREEN
      until_bash: |
        set -u
        REQ="$ARGUMENTS"
        fm() { sed -n '/^---$/,/^---$/p' "$1" | sed -n "s/^$2:[[:space:]]*//p" | head -1 | sed -e 's/^["'\'']//' -e 's/["'\'']$//'; }
        RD=$(fm "$REQ" resultsDir)
        ls "$RD"/*.VERTICAL-SLICE.task.md >/dev/null 2>&1 || exit 1
        for T in "$RD"/*.VERTICAL-SLICE.task.md; do
          R=$(fm "$T" resultPath)
          [ -n "$R" ] && [ -f "$R" ] || exit 1
          [ "$(fm "$R" status)" = "DONE" ] || exit 1
          REV="${R%.result.md}.review.md"
          [ -f "$REV" ] || exit 1
          [ "$(fm "$REV" verdict)" = "APPROVED" ] || exit 1
        done
        GS=$(fm "$REQ" gateSuite); GL=$(fm "$REQ" gateLint)
        if [ -n "$GS" ]; then sh -c "$GS" || exit 1; fi
        if [ -n "$GL" ]; then sh -c "$GL" || exit 1; fi
        exit 0
      max_iterations: 8
      fresh_context: true

  # --------------------------------------------------------------------------
  # 4) Non-Git checkpoint with re-run evidence (R21)
  # --------------------------------------------------------------------------
  - id: checkpoint
    depends_on: [vertical-loop]
    timeout: 900000
    bash: |
      set -u
      REQ="$ARGUMENTS"
      fm() { sed -n '/^---$/,/^---$/p' "$1" | sed -n "s/^$2:[[:space:]]*//p" | head -1 | sed -e 's/^["'\'']//' -e 's/["'\'']$//'; }
      RD=$(fm "$REQ" resultsDir); CP=$(fm "$REQ" checkpointPath)
      GS=$(fm "$REQ" gateSuite); GL=$(fm "$REQ" gateLint)
      SUITE_OUT=""; LINT_OUT=""
      if [ -n "$GS" ]; then SUITE_OUT=$(sh -c "$GS" 2>&1 | tail -20) || { echo "ERROR: gateSuite failed at vertical checkpoint" >&2; exit 1; }; fi
      if [ -n "$GL" ]; then LINT_OUT=$(sh -c "$GL" 2>&1 | tail -20) || { echo "ERROR: gateLint failed at vertical checkpoint" >&2; exit 1; }; fi
      {
        echo "---"
        echo "phase: VERTICAL"
        echo "status: PASS"
        echo "producedBy: archon_sldc_vertical"
        echo "workflowRunId: $WORKFLOW_ID"
        echo "---"
        echo "<checkpoint>"
        echo "  <slices>"
        for T in "$RD"/*.VERTICAL-SLICE.task.md; do
          R=$(fm "$T" resultPath)
          echo "    <slice task=\"$T\" status=\"$(fm "$R" status)\" review=\"$(fm "${R%.result.md}.review.md" verdict)\"/>"
        done
        echo "  </slices>"
        echo "  <gate>"
        echo "    <suite cmd=\"$GS\"><![CDATA[$SUITE_OUT]]></suite>"
        echo "    <lint cmd=\"$GL\"><![CDATA[$LINT_OUT]]></lint>"
        echo "  </gate>"
        echo "</checkpoint>"
      } > "$CP"
      echo "checkpoint written: $CP"

  # --------------------------------------------------------------------------
  # 5) Sink — one plain parseable line: PASS CHECKPOINT_PATH (R22)
  # --------------------------------------------------------------------------
  - id: report
    depends_on: [checkpoint]
    timeout: 15000
    bash: |
      set -u
      fm() { sed -n '/^---$/,/^---$/p' "$1" | sed -n "s/^$2:[[:space:]]*//p" | head -1 | sed -e 's/^["'\'']//' -e 's/["'\'']$//'; }
      printf 'PASS %s\n' "$(fm "$ARGUMENTS" checkpointPath)"
