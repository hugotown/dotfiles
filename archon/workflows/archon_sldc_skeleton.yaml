    model: minimax/MiniMax-M3
    prompt: |
      You are the CENTRAL TRIAGE oracle (phase H, fresh, strong model) of the
      archon_sldc dry-run. You diagnose cross-file breakage centrally; you do
      NOT fix inline (R12) and you do NOT commit (R21).


      INPUTS (read these files — R22):
      - $ARTIFACTS_DIR/handoffs/g-fix.md
      - $ARTIFACTS_DIR/contracts/a/contract_a.md

      OUTPUT: write $ARTIFACTS_DIR/handoffs/h-triage.md:
        # TRIAGE H
        ## Affected files
        ## Root cause (per systematic-debugging)
        ## Contracts to re-freeze (or "none")

      Then print EXACTLY one final line:
      "RECEIVED: g-fix.md · TRIAGE(H) · h-triage.md written (central diagnosis) 😉"

      RULES: never commit (R21). Files only, no structured output (R22).

  - id: fanout-h
    depends_on: [triage-h]
    context: fresh
    model: minimax/MiniMax-M2.7-highspeed
    prompt: |
      You are a FANOUT FIXER (phase H, fresh) of the archon_sldc dry-run.
      DRY RUN: no real edits. You apply the central triage to affected files.


      INPUTS (read these files — R22):
      - $ARTIFACTS_DIR/handoffs/h-triage.md
      - $ARTIFACTS_DIR/contracts/a/contract_a.md

      OUTPUT: write $ARTIFACTS_DIR/handoffs/h-fanout.md (status: DONE + what each
      affected file would change).
      Then print EXACTLY one final line:
      "RECEIVED: h-triage.md · FANOUT FIXER(H) · h-fanout.md written 😉"

      RULES: never commit (R21). Files only, no structured output (R22).

  - id: review-h
    depends_on: [fanout-h]
    context: fresh
    model: minimax/MiniMax-M2.7-highspeed
    prompt: |
      You are the REVIEWER for phase H (fresh) of the archon_sldc dry-run.
      INPUTS (R22): $ARTIFACTS_DIR/handoffs/h-fanout.md and h-triage.md
      OUTPUT: write $ARTIFACTS_DIR/handoffs/h-review.md (Crit/Imp/Minor or "clean").
      Then print EXACTLY: "RECEIVED: h-fanout.md · REVIEWER(H) · h-review.md written 😉"
      RULES: never commit (R21). Files only, no structured output (R22).

  - id: refreeze-h
    depends_on: [review-h]
    timeout: 60000
    bash: |
      set -e
      echo "RE-FREEZE + RE-GATE after TRIAGE (dry-run): re-freeze mutated contracts, global gate"
      for f in handoffs/h-triage.md handoffs/h-fanout.md handoffs/h-review.md; do
        if [ -f "$ARTIFACTS_DIR/$f" ]; then echo "  ✓ $f"; else echo "  ✗ missing $f"; exit 1; fi
      done
      mkdir -p $ARTIFACTS_DIR/checkpoints
      printf 'RE-FREEZE/RE-GATE H checkpoint — NO-Git (R21)\n' > $ARTIFACTS_DIR/checkpoints/h.checkpoint.md
      echo "CHECKPOINT: $ARTIFACTS_DIR/checkpoints/h.checkpoint.md 😉"

  # Phase I — REFACTOR (clarity only; no behavior/signature change)
  - id: refactor-i
    depends_on: [refreeze-h]
    context: fresh
    model: minimax/MiniMax-M2.7-highspeed
    prompt: |
      You are a REFACTOR WORKER (phase I, fresh) of the archon_sldc dry-run.
      DRY RUN: no real code. Clarity only — no behavior or signature change.


      INPUTS (read these files — R22):
      - $ARTIFACTS_DIR/contracts/a/contract_a.md
      - $ARTIFACTS_DIR/handoffs/h-review.md

      OUTPUT: write $ARTIFACTS_DIR/handoffs/i-refactor.md (status: DONE + which
      clarity-only refactors you'd make).
      Then print EXACTLY one final line:
      "RECEIVED: h-review.md · REFACTOR WORKER · i-refactor.md written (clarity only) 😉"

      RULES: never commit (R21). Files only, no structured output (R22).

  - id: review-i
    depends_on: [refactor-i]
    context: fresh
    model: minimax/MiniMax-M2.7-highspeed
    prompt: |
      You are the REVIEWER for phase I (fresh) of the archon_sldc dry-run.
      INPUTS (R22): $ARTIFACTS_DIR/handoffs/i-refactor.md and contracts/a/contract_a.md
      OUTPUT: write $ARTIFACTS_DIR/handoffs/i-review.md (Crit/Imp/Minor or "clean").
      Then print EXACTLY: "RECEIVED: i-refactor.md · REVIEWER(I) · i-review.md written 😉"
      RULES: never commit (R21). Files only, no structured output (R22).

  - id: fix-i
    depends_on: [review-i]
    context: fresh
    model: minimax/MiniMax-M2.7-highspeed
    prompt: |
      You are the FIXER for phase I (fresh) of the archon_sldc dry-run.
      INPUTS (R22): $ARTIFACTS_DIR/handoffs/i-review.md and i-refactor.md
      OUTPUT: write $ARTIFACTS_DIR/handoffs/i-fix.md (status: DONE + what you'd change).
      Then print EXACTLY: "RECEIVED: i-review.md · FIXER(I) · i-fix.md written 😉"
      RULES: never commit (R21). Files only, no structured output (R22).

  # ==========================================================================
  # STEP 10 — GLOBAL GATE E: full suite GREEN + lint together, then cross-file
  # review [R7]
  # ==========================================================================
  - id: gate-e-global
    depends_on: [fix-i]
    timeout: 120000
    bash: |
      set -e
      echo "GLOBAL GATE E (dry-run): full suite GREEN + lint together"
      missing=0
      for f in a-fix b-fix d-fix f-fix g-fix h-review i-fix; do
        if [ -f "$ARTIFACTS_DIR/handoffs/$f.md" ]; then echo "  ✓ $f"; else echo "  ✗ missing $f"; missing=1; fi
      done
      [ "$missing" = "0" ] || { echo "GATE E: missing phase handoffs"; exit 1; }
      mkdir -p $ARTIFACTS_DIR/checkpoints
      printf 'GLOBAL GATE E checkpoint — NO-Git (R21)\n' > $ARTIFACTS_DIR/checkpoints/e-global.checkpoint.md
      echo "CHECKPOINT: $ARTIFACTS_DIR/checkpoints/e-global.checkpoint.md 😉"

  - id: cross-file-review
    depends_on: [gate-e-global]
    context: fresh
    model: minimax/MiniMax-M3
    prompt: |
      You are the CROSS-FILE REVIEWER (fresh, strong model) of the archon_sldc
      dry-run. You review the whole integration; you do NOT edit or commit (R21).


      INPUTS (read these files — R22):
      - $ARTIFACTS_DIR/plans/plan.md
      - $ARTIFACTS_DIR/handoffs/i-fix.md
      - $ARTIFACTS_DIR/handoffs/h-triage.md

      OUTPUT: write $ARTIFACTS_DIR/handoffs/cross-file-review.md:
        # CROSS-FILE REVIEW
        ## Contract drift across files (or "none")
        ## Verdict: PASS | TRIAGE

      Then print EXACTLY one final line:
      "RECEIVED: plan + i-fix + h-triage · CROSS-FILE REVIEW · cross-file-review.md written 😉"

      RULES: never commit (R21). Files only, no structured output (R22).

  # ==========================================================================
  # STEP 11 — the ONLY git commit of the whole method [R17, R21].
  # DRY RUN: this only ECHOES; it does NOT run `git commit`.
  # ==========================================================================
  - id: final-commit
    depends_on: [cross-file-review]
    timeout: 60000
    bash: |
      set -e
      echo "FINAL COMMIT (dry-run, R17): este sería el ÚNICO commit del método."
      echo "  (dry-run: NO se ejecuta git commit)"
      if [ -f "$ARTIFACTS_DIR/handoffs/cross-file-review.md" ]; then echo "  ✓ cross-file-review presente"; else echo "  ✗ falta cross-file-review"; exit 1; fi
      mkdir -p $ARTIFACTS_DIR/checkpoints
      printf 'final-commit dry-run marker — NO real git commit (R17)\n' > $ARTIFACTS_DIR/checkpoints/final-commit.marker.md
      echo "MARKER: $ARTIFACTS_DIR/checkpoints/final-commit.marker.md 😉"

  # ==========================================================================
  # STEP 12 — finishing: MAIN + HUMAN decide MERGE/PR/KEEP/DISCARD
  # [R14 intervention #3]
  # ==========================================================================
  - id: finishing
    depends_on: [final-commit]
    model: minimax/MiniMax-M2.7-highspeed
    prompt: |
      You are MAIN (0) running FINISHING (human intervention #3 — R14) of the
      archon_sldc dry-run. You do NOT commit (the single commit already
      happened at final-commit — a dry-run echo here).


      INPUTS (read these files — R22):
      - $ARTIFACTS_DIR/handoffs/cross-file-review.md
      - $ARTIFACTS_DIR/checkpoints/final-commit.marker.md

      OUTPUT: write $ARTIFACTS_DIR/handoffs/finishing.md summarizing the options
      (MERGE | PR | KEEP | DISCARD) with your recommendation.
      Then print, in Spanish, a short summary and the recommended option for
      the human, ending with:
      "RECEIVED: cross-file-review + marker · FINISHING · finishing.md written, awaiting human decision 😉"

      RULES: never commit (R21). Files only, no structured output (R22).

  - id: human-finishing-decision
    depends_on: [finishing]
    approval:
      message: "FINISHING (R14 #3): revisa $ARTIFACTS_DIR/handoffs/finishing.md y decide MERGE | PR | KEEP | DISCARD."
      capture_response: true
