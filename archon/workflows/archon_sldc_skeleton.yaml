# ============================================================================
# archon_sldc_skeleton — DRY-RUN of the full resolutive method (Piezas 1-5)
#
# ⚠ DO NOT edit this file through the Archon web UI workflow editor: it
# re-serializes the YAML to single-line flow style and silently DROPS the
# fields it does not model (loop:, interactive:, worktree:, all comments).
# Edit it with a text editor only.
#
# WHAT THIS IS: a DRY RUN of the whole method. No node writes real code. Every
# agent node (a) reads the SKILL.md its role needs (R16), (b) reads its INPUT
# handoff files to prove the right information reached it, (c) writes its OWN
# handoff file, and (d) prints an English confirmation line. The point is to
# validate the file-based handoff plumbing across the entire DAG, not to build
# software. Gates and the final commit are bash echoes.
#
# PROVIDER / MODELS: provider is pi; every node model is a minimax model
# (per `pi --list-models`):
#   minimax/MiniMax-M3              → strong roles (MAIN/oracle/planner/
#                                     semantic gates/triage/cross-file review)
#   minimax/MiniMax-M2.7-highspeed  → workers / reviewers / fixers / probes /
#                                     orchestrator / finishing
# Credentials: MINIMAX_API_KEY must be present in the environment of BOTH
# `archon serve` and any CLI resume/approve (OS-level export).
#
# HANDOFF LAYOUT (R22 — files only, NO structured_output/output_format). All
# artifacts live under Archon's built-in per-run dir $ARTIFACTS_DIR, which for a
# no-remote local repo resolves to
#   ~/.archon/workspaces/_local/<repo>/artifacts/runs/<run-id>/
# — OUTSIDE the repo tree, and unique per run (each run starts clean; the dir is
# stable across the interactive-loop gate resumes since the run-id is stable).
# The paths the user suggested map here:
#   artifacts/stack/stack.md        → $ARTIFACTS_DIR/stack/stack.md
#   artifacts/design/design.md      → $ARTIFACTS_DIR/design/design.md
#   (human decisions ledger)        → $ARTIFACTS_DIR/design/user_decisions.md
#                                     append-only; brainstorm reads it FIRST
#                                     every round so it never re-asks a settled
#                                     question (root-cause fix for repeats)
#   (independent review verdict)    → $ARTIFACTS_DIR/design/design.md
#                                     written each round by a FRESH minimax
#                                     reviewer the brainstorm spawns via `pi`
#                                     (bash); its verdict drives the questions
#   artifacts/plans/plan.md         → $ARTIFACTS_DIR/plans/plan.md
#   artifacts/contracts/a/…         → $ARTIFACTS_DIR/contracts/a/contract_a.md
#   (+ $ARTIFACTS_DIR/handoffs/*.md and $ARTIFACTS_DIR/checkpoints/*.md)
#
# SKILLS (R16) — ZERO EXTERNAL REFERENCES: Archon's `skills:` field is Claude-only
# and is OMITTED. The brainstorm node has the brainstorming skill, the spec-reviewer
# prompt, and the visual-companion guide INLINED as XML tags; its companion server
# scripts are materialized from inlined base64 (node vc-setup). The downstream
# dry-run nodes no longer read any external SKILL.md — the reads were removed (a
# dry echo needs no skill). Nothing outside this workflow file is referenced.
#
# PARALLELISM: the real method fans each TDD phase out to N FRESH workers
# (1 per eligible contract, waves ≤7 — R9/R20). This dry-run collapses each
# phase to a SINGLE node, as requested; the wave count stays TO_BE_DEFINED.
#
# RULES MAPPED TO STRUCTURE:
#   R2  STUBS global first: stubs-a is the only entry to any TDD work.
#   R14 Exactly 3 ordinary HUMAN interventions: brainstorm (#1),
#       hard-gate-spec (#2), human-finishing-decision (#3).
#   R17/R21 The ONLY git commit is final-commit (a dry-run echo here). No agent
#       node commits, ever.
#   R22 No structured_output / output_format anywhere. Handoffs travel as files
#       under $ARTIFACTS_DIR/ and plain-text node outputs.
# ============================================================================

name: archon_sldc_skeleton
description: >
  DRY RUN of the full resolutive method: repo snapshot, stack probe, brainstorm
  with the human, fresh design verification, human hard gate, writing-plans with
  a frozen CONTRACT MASTER, execution orchestrator, global STUBS barrier +
  contract review gate, horizontal file-by-phase pipeline (A stubs, B tests,
  D impl, F hardening, G edge, H triage, I refactor) each collapsed to a single
  node with worker/review/fix/gate, global GATE E with cross-file review, single
  final commit (echo), and human finishing. No real code is written: every LLM
  proves it received its file-based handoff and prints a confirmation.

provider: pi
model: minimax/MiniMax-M2.7-highspeed
interactive: true
worktree:
  enabled: false

nodes:
  # ==========================================================================
  # NODE 0 — repo snapshot: gitignore-aware tree (level 5) as plain-text
  # context for downstream nodes (R22: travels as node output, no structure)
  # ==========================================================================
  - id: eza-tree
    timeout: 30000
    bash: |
      eza --tree --level=5 --git-ignore . 2>&1

  # ==========================================================================
  # NODE 0b — STACK PROBE: inspect the repo and record HOW to run tests, lint,
  # build, typecheck, db. This is real repo introspection (not a dry echo) so
  # downstream planning has honest commands. Writes $ARTIFACTS_DIR/stack/stack.md.
  # ==========================================================================
  - id: stack-probe
    depends_on: [eza-tree]
    model: minimax/MiniMax-M2.7-highspeed
    prompt: |
      You are the STACK PROBE of the archon_sldc dry-run. Produce an honest
      "how to operate this repo" doc. LANGUAGE: doc in English.

      CONTEXT:
      - Repo tree (level 5): <repo_tree> $eza-tree.output </repo_tree>

      DO THIS:
      1. Read package.json (root) and, if present, turbo.json, biome.json,
         bts.jsonc, and any workspace package.json under apps/ and packages/.
         Use the bash tool (cat / ls) to read them.
      2. Create $ARTIFACTS_DIR/stack/ with `mkdir -p` and write stack.md with
         these sections, filling each with the ACTUAL commands you found (write
         "NOT CONFIGURED" where a script is genuinely missing — do not invent):
           # STACK — how to operate this repo
           ## Package manager
           ## Install
           ## Build
           ## Test        (flag clearly if there is no test runner configured)
           ## Lint
           ## Typecheck
           ## Database
           ## Notes / gaps
           ## Quirks
      3. Print EXACTLY one final line:
         "RECEIVED: repo tree · STACK PROBE · stack.md written with real commands 😉"

      RULES: never commit (R21). Files only, no structured output (R22). Only
      write inside $ARTIFACTS_DIR/.

  # ==========================================================================
  # NODE 0c — VISUAL COMPANION SETUP: materialize the browser-companion server
  # scripts into $ARTIFACTS_DIR/vc from INLINED base64. ZERO external references:
  # the scripts live in THIS workflow, not in any skills dir. Node-only (server.cjs
  # has no npm deps). Runs early so the companion is ready if a visual question arises.
  # ==========================================================================
  - id: vc-setup
    depends_on: [eza-tree]
    timeout: 60000
    bash: |
      set -e
      mkdir -p "$ARTIFACTS_DIR/vc"
      printf '%s' '' | base64 -d > "$ARTIFACTS_DIR/vc/server.cjs"
      printf '%s' '' | base64 -d > "$ARTIFACTS_DIR/vc/start-server.sh"
      printf '%s' '' | base64 -d > "$ARTIFACTS_DIR/vc/stop-server.sh"
      printf '%s' '' | base64 -d > "$ARTIFACTS_DIR/vc/frame-template.html"
      printf '%s' '' | base64 -d > "$ARTIFACTS_DIR/vc/helper.js"
      printf '%s' '' | base64 -d > "$ARTIFACTS_DIR/vc/vc-stop.sh"
      chmod +x "$ARTIFACTS_DIR/vc/start-server.sh" "$ARTIFACTS_DIR/vc/stop-server.sh" "$ARTIFACTS_DIR/vc/vc-stop.sh"
      # Validate the tunnel tool the companion needs (non-fatal — companion is optional/JIT).
      if command -v cloudflared >/dev/null 2>&1; then
        echo "  cloudflared OK: $(cloudflared --version 2>&1 | head -1)"
      else
        echo "  WARN: cloudflared not found — the visual companion tunnel will be unavailable"
      fi
      echo "RECEIVED: VC scripts materialized to $ARTIFACTS_DIR/vc (server+start+stop+frame+helper) 😉"

  # ==========================================================================
  # STEP 0 — MAIN (0): brainstorming with the HUMAN → spec candidato, with the
  # design reviewer EMBEDDED in the same node [R14 intervention #1].
  #
  # Why embedded (not a separate verifier node): a separate FRESH verifier as its
  # own DAG node feeding back into the brainstorm would need a loop_group, which
  # the installed Archon v0.5.0 binary does NOT support. So the review is folded
  # INTO the brainstorm node: each round MAIN produces the spec, then SPAWNS a
  # genuinely independent reviewer by shelling out to a fresh `pi` process
  # (minimax, --no-session, no tools/context) over the spec files, captures its
  # verdict into design.md, and uses those findings to drive its questions. This
  # gives real model independence (a separate invocation, not the same context
  # "putting on a hat") without needing loop_group.
  #
  # Interactive LOOP = approval gate per round: MAIN asks, PAUSES (gate_message),
  # the human answers via `archon workflow approve`, and the answer arrives next
  # round as $LOOP_USER_INPUT. Round 1 is hard-forbidden from closing (engine +
  # prompt). The human may type `listo` to force-close.
  # ==========================================================================
  - id: brainstorm
    depends_on: [eza-tree, stack-probe, vc-setup]
    model: minimax/MiniMax-M3
    # skills: [brainstorming] — loop nodes ignore the `skills:` field; the skill
    # is injected inside the loop prompt via the mandatory SKILL.md read (R16).
    loop:
      prompt: |
        You are MAIN (0) of the resolutive method, running the BRAINSTORMING
        stage (human intervention #1 of exactly 3 — R14). Your ONLY job here
        is to turn the human's idea into a SPEC CANDIDATO through rounds of
        questions. You NEVER implement code, never plan tasks, never commit
        (R21) — design conversation and artifact files, nothing else.

        TECHNIQUE (inlined & ADAPTED to this workflow — do NOT read any
        external file): the brainstorming technique, the spec-reviewer rubric, and
        the visual-companion guide are at the BOTTOM of this prompt as
        <brainstorming_skill>, <spec_reviewer_prompt>, and
        <visual_companion_guide>. They are already rewritten for Archon (they use
        $ARTIFACTS_DIR, the ledger, the pi reviewer, and the gate model — no
        docs/ files, no git commits, no "invoke writing-plans"). Apply the
        technique for the conversation; the OUTPUT CONTRACT below always wins.

        LANGUAGE: address the human ALWAYS in Spanish. The artifacts are
        written in English. Never mix scripts/languages (no CJK/stray chars).

        CONTEXT AVAILABLE TO YOU:
        - Idea / PRD from the human: <user_request> $ARGUMENTS </user_request>
        - Repo snapshot (gitignore-aware tree, level 5): <repo_tree> $eza-tree.output </repo_tree>
        - Answers the human just gave at the gate: <human_answer> $LOOP_USER_INPUT </human_answer>
        - Your own previous round output: <prev_round_output> $LOOP_PREV_OUTPUT </prev_round_output>

        ═══ NON-NEGOTIABLE OUTPUT CONTRACT (overrides the skill) ═══
        By the END of EVERY round you MUST have produced, with your tools, BOTH
        files below — no exceptions, no "I'll do it next round":
          A. $ARTIFACTS_DIR/design/spec-candidate.md — the spec, written with the
             WRITE tool (or a `bash` heredoc). This is your PRIMARY deliverable;
             the questions to the human are SECONDARY. If this file does not
             exist when your turn ends, you have FAILED the round.
          B. $ARTIFACTS_DIR/design/design.md — the independent pi reviewer's
             verdict (step 4). It MUST exist too (even if just a one-line note
             when the reviewer can't run).
        Write A and B BEFORE you ask the human anything. Ending a turn with only
        questions and no spec file is the single worst failure here.

        GROUNDING (do this BEFORE asking anything): the repo is the SOURCE OF
        TRUTH for facts about the current code. ANY would-be question the code can
        answer, you MUST answer yourself by searching — NEVER ask the human "does
        X already exist?" / "is there a table / route / type / component for Y?".
        Use TARGETED searches (learn a tool with `--help` if unsure of its flags):
          - rg --help        ripgrep — fast content / regex search
          - ast-grep --help  structural / AST search for defs, symbols, types
          - eza --help       tree / listing (a level-5 tree is already in <repo_tree>)
        Ground the exact facts you need before writing each requirement (e.g. for
        a DB requirement: `rg -n "pgTable|createTable|sqliteTable|schema" packages/db/src`
        and `ast-grep` for the entity), then state what you FOUND as a fact in the
        spec/decisions. Search with PURPOSE — no aimless file reading.

        ═══ EVERY ROUND (do IN THIS ORDER) ═══
        1. READ & GROUND. First `cat` the three artifacts:
           $ARTIFACTS_DIR/design/user_decisions.md (the APPEND-ONLY ledger and
           SOURCE OF TRUTH; absent → ROUND 1, nothing decided),
           $ARTIFACTS_DIR/design/spec-candidate.md (prior spec, if any), and
           $ARTIFACTS_DIR/stack/stack.md (if present). THEN ground in the codebase
           (see GROUNDING above): run the targeted rg/ast-grep searches needed to
           answer every FACTUAL question about the current code before you would
           ask it. Every decision in the ledger is FINAL — HARD-FORBIDDEN to
           re-ask; if a past answer was ambiguous ask a NARROWER follow-up, never
           repeat. Re-asking a settled question is a top failure.
        2. APPEND new decisions to user_decisions.md (`mkdir -p` first). Map each
           <human_answer> to the question it resolves. Empty <human_answer> on a
           question round = "decide yourself" → record as DECIDED BY MAIN. NEVER
           leave "Awaiting". One block per decision:
             ## Round <n>
             ### D<k> — <short title>  [spec section: <Goals|Users|FR|NFR|...>]
             Question asked: <the question>
             Why it mattered: <what this unblocks>
             Human answer (verbatim): <the answer slice, or "(none → MAIN decided)">
             RESOLVED: <the locked decision, one line>
        3. WRITE THE SPEC NOW (contract A — do this before questions). Use the
           write tool to create/overwrite $ARTIFACTS_DIR/design/spec-candidate.md,
           self-contained, with sections: Problem, Goals, Non-Goals, Users &
           Flows, Functional Requirements, Non-Functional Requirements,
           Constraints & Assumptions, Open Questions, Decisions Log. The Decisions
           Log MUST be reconstructed FROM user_decisions.md (never "Awaiting").
        4. RUN THE INDEPENDENT REVIEWER NOW (contract B) — a fresh minimax process
           (NOT your own head; same context ≠ independent). The reviewer reads its
           credential from the environment ($MINIMAX_API_KEY), inherited by this
           node. NEVER pass the key as an argument and NEVER print it — only test
           its PRESENCE. Steps:
           a. Guard: if [ -z "$MINIMAX_API_KEY" ], the reviewer cannot run — write
              exactly "## Verdict\nREVIEWER_UNAVAILABLE\n\n## Blocking issues\n- reviewer: MINIMAX_API_KEY not present in the node environment"
              to $ARTIFACTS_DIR/design/design.md and SKIP to step 5. Do NOT review
              the spec yourself.
           b. Otherwise run this exact bash one-liner (attach spec always; add the
              other two @files only if they exist). It relies on the ENV key (no
              --api-key), and MUST prefix `env -u PI_PACKAGE_DIR` — Archon exports
              PI_PACKAGE_DIR pointing at its shim, which a nested pi would follow
              and crash on (ENOENT on a theme file); unsetting it lets the real pi
              resolve its own assets. stderr goes to a diagnosable log (not
              /dev/null). It is CALIBRATED to approve unless there are real blockers:
             env -u PI_PACKAGE_DIR pi -p --no-session --mode text -nt -nc -ns -ne --model minimax/MiniMax-M3 --append-system-prompt 'You are an INDEPENDENT spec reviewer; you did NOT write this spec. Verify it is complete, consistent, and ready for implementation planning. Only flag issues that would cause REAL problems during planning: missing sections or TODO/TBD/placeholder text (Completeness); internal contradictions or conflicts with the locked decisions/stack (Consistency); requirements ambiguous enough to build the wrong thing (Clarity); scope covering multiple independent subsystems instead of one focused plan (Scope); unrequested features or over-engineering (YAGNI). Do NOT flag wording, style, or "some sections less detailed than others". Approve unless there are serious gaps that would lead to a flawed plan.' 'Review the attached spec against the locked decisions and the stack. Output English markdown: first a line "## Verdict" = READY_FOR_HARD_GATE or NEEDS_REWORK; then "## Blocking issues" listing only real planning-blockers as "- [section]: [issue] - [why it matters for planning]" (or "none"); then "## Recommendations" (advisory only, MUST NOT affect the verdict).' @$ARTIFACTS_DIR/design/spec-candidate.md @$ARTIFACTS_DIR/design/user_decisions.md @$ARTIFACTS_DIR/stack/stack.md > $ARTIFACTS_DIR/design/design.md 2>$ARTIFACTS_DIR/design/reviewer.stderr.log
           c. HONESTY CHECK: if the command exited non-zero OR design.md is empty
              OR it has no "## Verdict" line, the reviewer FAILED. Overwrite
              design.md with "## Verdict\nREVIEWER_UNAVAILABLE\n\n## Blocking issues\n- reviewer: "
              plus the last line of reviewer.stderr.log. You are FORBIDDEN from
              reviewing the spec yourself or writing a READY_FOR_HARD_GATE verdict
              you produced — the verdict must come from the independent process or
              be REVIEWER_UNAVAILABLE.
           Then `cat $ARTIFACTS_DIR/design/design.md`. Treat its BLOCKING issues as
           a senior reviewer you CANNOT ignore (Recommendations are advisory).
        5. CLASSIFY, then ASK. If genuinely-open questions remain (including the
           reviewer's BLOCKING items), FIRST catalog each open question in the
           spec as [visual] or [terminal] — the test: "would the human understand
           this better SHOWN than told?". [visual] = a real mockup / wireframe /
           layout / diagram / look-and-feel or side-by-side comparison. [terminal]
           = requirements, scope, conceptual A/B/C, tradeoffs, API/data decisions.
           A UI *topic* is NOT automatically visual. Tag the medium on each Open
           Question so it is cataloged.
           - VISUAL BRANCH: if ANY open question this round is [visual] and you
             have NOT yet offered the companion, you MUST OFFER IT JUST-IN-TIME as
             its OWN message (nothing else in the turn), in Spanish, e.g.:
             "Esta parte quizá sea más clara si te la MUESTRO — puedo armar
             mockups/diagramas/comparaciones en el navegador y te paso una URL
             pública (túnel cloudflared). ¿La activo?"
             Then END the turn (the gate collects yes/no). On ACCEPT next round:
             START the server + cloudflared tunnel + REGISTER the url (VISUAL
             COMPANION block above) and use the browser for the [visual] questions.
             On DECLINE: continue text-only and do not re-offer.
           - TERMINAL BRANCH (default, and for [terminal] questions once the
             companion is settled): end with a VISIBLE PLAIN-TEXT message TO THE
             HUMAN IN SPANISH of AT MOST 3 net-new questions. For EACH include:
             • Why you ask it: what it unblocks / how it adds value (if you can't
               state real value, DON'T ask it).
             • Which spec section it affects.
             • The options WITH their impact (not just the list: what each implies).
             • Your recommended default, so the human can answer fast.
           Then END WITHOUT the promise (the gate pauses and collects answers).
        6. CLOSING. MANDATORY VISUAL-COMPANION SHUTDOWN FIRST: before you emit
           the promise, the companion server MUST be OFF, its port FREE, and the
           cloudflared TUNNEL killed. Run the SINGLE atomic shutdown helper (it
           stops the server, kills the tunnel, deletes the url file, and verifies):
             "$ARTIFACTS_DIR/vc/vc-stop.sh" "$ARTIFACTS_DIR"
           It prints {"server":"stopped","tunnel":"killed|not_started|STILL_ALIVE"}
           and exits non-zero if the tunnel is STILL_ALIVE. You MUST NOT emit
           SPEC_READY unless it exits 0 and tunnel is "killed" or "not_started" —
           at SPEC_READY neither the tunnel nor the companion port may be listening.
           If it reports STILL_ALIVE, run it again until it succeeds.
           Then emit
           <promise>SPEC_READY</promise> when EITHER trigger below fires (FORBIDDEN
           in round 1 — the engine also blocks it, so round 1 always asks first).
           The exact string SPEC_READY must NEVER appear in any other situation.
           (a) HUMAN FORCE-CLOSE — if <human_answer> expresses "enough, close
               it" in any phrasing (e.g. "listo", "suficiente", "ya", "cierra",
               "así está bien", "no más preguntas", "procede", "adelante"):
               do NOT ask anything else. First RESOLVE every still-open question
               using your recommended default, appending each to
               user_decisions.md as DECIDED BY MAIN (human requested close), then
               finalize the spec + design.md, present a short Spanish summary,
               and emit the promise. The human's "enough" is an order — never
               answer it with another question.
           (b) LLM AUTONOMOUS CLOSE — allowed ONLY when the step-4 INDEPENDENT
               reviewer's verdict in design.md is exactly READY_FOR_HARD_GATE (a
               verdict of NEEDS_REWORK or REVIEWER_UNAVAILABLE FORBIDS autonomous
               close — you may not close on your own judgment when the independent
               reviewer did not approve). With that verdict, a spec existing before
               this round, and no blocking question remaining: say so in Spanish
               ("ya no tengo preguntas bloqueantes; cierro el spec"), finalize, and
               emit the promise. Do not invent nice-to-know questions to prolong
               the loop. (If the reviewer is REVIEWER_UNAVAILABLE, tell the human
               so at the gate — only their force-close (a) can proceed.)

        ═══ QUESTION DISCIPLINE (what NOT to ask) ═══
        - NEVER ask a FACTUAL question the codebase answers — e.g. "¿ya tienes la
          tabla o hay que crearla?", "does route/type/component/endpoint X exist?".
          GROUND it with rg/ast-grep FIRST and state the finding as a fact. Asking
          the human to describe their own code is a failure.
        - NEVER ask a question already resolved in user_decisions.md.
        - NEVER ask obvious questions whose answer is implied by the idea, the
          repo/stack, or standard practice — assume the obvious default and
          record it as DECIDED BY MAIN instead of asking.
        - Only ask BLOCKING questions (you cannot write a testable requirement
          without the answer). Defer nice-to-know items to Non-Goals or
          Constraints.
        - Prefer confirming an assumption ("asumo X, ¿ok?") over open-ended
          questions, and always carry your recommended default.

        QUALITY BAR for closing: every requirement testable, scope bounded by
        explicit Non-Goals, no TBD/placeholder text anywhere, every decision
        traceable to user_decisions.md, and the step-4 independent reviewer's
        verdict in design.md is READY_FOR_HARD_GATE.

        ═══ VISUAL COMPANION — control + REGISTER its URL (optional) ═══
        <visual_companion_guide> below is a browser tool for showing mockups/
        diagrams. Offer it JUST-IN-TIME (never upfront), only when a question is
        genuinely visual (a real layout/diagram/mockup choice, not a UI topic).
        The companion is served through a cloudflared tunnel so the human gets a
        public HTTPS URL (localhost is not shared). When you use it you MUST
        control BOTH processes and REGISTER the tunnel URL:
        - START the local server (no --open; the human uses the tunnel, not a
          local browser):
          "$ARTIFACTS_DIR/vc/start-server.sh" --project-dir "$ARTIFACTS_DIR"
          From its JSON keep the PORT and the session KEY (the ?key=… in `url`),
          and the SESSION DIR (parent of state_dir) → save it to
          $ARTIFACTS_DIR/design/visual-companion-session.txt.
        - TUNNEL with cloudflared (check `cloudflared tunnel --help` if unsure of
          flags). Start a quick tunnel to that port IN THE BACKGROUND and keep its
          pid so you can kill it later:
            nohup cloudflared tunnel --url "http://localhost:<PORT>" > "$ARTIFACTS_DIR/vc/cloudflared.log" 2>&1 &
            echo $! > "$ARTIFACTS_DIR/vc/cloudflared.pid"
          Then read the public base URL from the log (retry a few times until it
          appears):
            grep -oE 'https://[a-z0-9.-]+\.trycloudflare\.com' "$ARTIFACTS_DIR/vc/cloudflared.log" | head -1
        - REGISTER: build the PUBLIC URL = <trycloudflare base> + the "/?key=…"
          from the local url (NEVER strip the key) and write it to
          $ARTIFACTS_DIR/design/visual-companion-url.txt (overwrite). Re-share
          THIS public URL with the human every time you push a screen.
        - CONTROL: before referring to the URL, confirm the server is alive
          ($STATE_DIR/server-info exists AND $STATE_DIR/server-stopped does not)
          and the tunnel process is up; if down, restart it and re-register the
          new tunnel URL. Shutdown is MANDATORY at SPEC_READY (step 6): the local
          port must be free, the server off, AND the tunnel killed
          (`kill "$(cat $ARTIFACTS_DIR/vc/cloudflared.pid)"`). You may also stop
          mid-design with "$ARTIFACTS_DIR/vc/stop-server.sh" "$(cat $ARTIFACTS_DIR/design/visual-companion-session.txt)"
          plus the same cloudflared kill.
        Follow <visual_companion_guide> for the screen-writing loop and CSS.

        <brainstorming_skill>
        Brainstorming technique, adapted to THIS Archon loop node. Turn the idea
        into a spec through natural, collaborative dialogue — but the OUTPUT
        CONTRACT above always wins: you persist the spec to $ARTIFACTS_DIR every
        round, you never write to docs/ and never commit (R21), and you never
        invoke the hard gate or writing-plans yourself (those are later DAG nodes).

        HARD GATE ON YOURSELF: never propose implementation, code, or scaffolding.
        Your only outputs are the spec, the decisions ledger, and the review
        verdict. Even a "simple" idea gets a design first.

        How to question:
        - Prefer multiple-choice; open-ended is fine. Ask at most 3 tightly-related
          questions per gate round (step 5); one topic at a time.
        - Focus on purpose, constraints, success criteria. Skip the obvious.
        - Assess scope EARLY: if the idea is really several independent subsystems,
          say so and help decompose, then spec only the FIRST sub-project. Don't
          refine details of something that must be split first.

        Exploring approaches:
        - When a design decision is open, offer 2-3 approaches with trade-offs,
          lead with your recommendation and why, and record the choice as a decision.

        Designing (inside the spec sections):
        - Scale each section to its complexity. Cover architecture, components,
          data flow, error handling, testing.
        - Design for isolation & clarity: small units, one purpose each, behind
          well-defined interfaces — each answerable as "what does it do, how is it
          used, what does it depend on". Leaky internals mean weak boundaries.

        In THIS repo (see <repo_tree> and stack.md):
        - Follow existing patterns; explore structure before proposing changes.
          Include only targeted improvements that serve the goal — no unrelated
          refactoring.

        Principles: multiple-choice preferred · YAGNI ruthlessly · always explore
        2-3 approaches · validate incrementally at the gate · revisit when
        something doesn't fit.
        </brainstorming_skill>

        <spec_reviewer_prompt>
        Rubric for the INDEPENDENT reviewer spawned in step 4 — a fresh `pi`
        minimax process (NOT a general-purpose subagent, NOT a docs/ file). It gets
        the spec + user_decisions.md + stack.md as attachments and returns a
        verdict written to $ARTIFACTS_DIR/design/design.md. Step-4's command
        already encodes this rubric; it is restated here for reference.

        Check (only real planning-blockers count):
        - Completeness — TODO/TBD/placeholder text, missing sections.
        - Consistency — internal contradictions, or conflicts with the locked
          decisions (user_decisions.md) or the real stack (stack.md).
        - Clarity — any requirement ambiguous enough to build the wrong thing.
        - Scope — focused enough for ONE plan, not several independent subsystems.
        - YAGNI — unrequested features, over-engineering.

        Calibration (so the loop can close): flag ONLY what would cause a flawed
        plan. Wording, style, and "some sections less detailed than others" are NOT
        issues. Approve unless there are serious gaps.

        Output:
        - "## Verdict" = READY_FOR_HARD_GATE | NEEDS_REWORK
        - "## Blocking issues" — "- [section]: [issue] - [why it matters]" (or none)
        - "## Recommendations" — advisory only; MUST NOT change the verdict.
        </spec_reviewer_prompt>

        <visual_companion_guide>
        Browser companion for a genuinely VISUAL question. Its scripts live at
        $ARTIFACTS_DIR/vc/ (materialized by the vc-setup node — zero external
        files, Node-only). Offering/registration/shutdown are governed by the
        VISUAL COMPANION control block above; this is the how-to.

        WHEN (decide per question): "would the human understand this better SHOWN
        than told?" Browser = real visual content (UI mockups/wireframes, layout
        comparisons, architecture/flow diagrams, look-and-feel). Terminal = words
        (requirements, scope, conceptual A/B/C, tradeoffs, API/data decisions). A
        UI *topic* is not automatically a visual question.

        START (only after the human accepts the just-in-time offer):
          "$ARTIFACTS_DIR/vc/start-server.sh" --project-dir "$ARTIFACTS_DIR" --open
        It prints JSON {port, url (with ?key=…), screen_dir, state_dir}. Always
        share the COMPLETE url (the ?key= gates access — never a bare host:port).

        LOOP:
        1. Confirm alive ($STATE_DIR/server-info exists, no $STATE_DIR/server-stopped);
           if down, restart with the SAME --project-dir (same port, tab reconnects).
        2. Write an HTML CONTENT FRAGMENT to a NEW file in screen_dir (semantic
           name, never reuse). Fragments are auto-wrapped by the frame template —
           no <html>/<head>/<script> needed. Use the write tool, never cat/heredoc.
        3. In the terminal, say what is on screen + re-share the url, then end your
           turn — that is your gate question this round.
        4. Next round, read $STATE_DIR/events (JSONL of clicks: {choice,text}) if it
           exists and merge with the human's terminal answer.
        5. When the next question is textual, push a waiting.html fragment to clear
           the screen.

        FRAGMENT CSS (from the frame): .options>.option[data-choice] with
        .letter/.content (add data-multiselect for multi); .cards>.card; .mockup
        (.mockup-header/.mockup-body); .split; .pros-cons (.pros/.cons);
        .mock-nav/.mock-sidebar/.mock-content/.mock-button/.mock-input/.placeholder;
        h2/h3/.subtitle/.section/.label. Options use onclick="toggleSelect(this)".
        Keep mockups simple (layout over polish), 2-4 options per screen, and state
        the question on every page.

        SHUTDOWN is MANDATORY at SPEC_READY (step 6): stop-server.sh turns the
        server off and frees the port, AND the cloudflared tunnel is killed (its
        saved pid). At SPEC_READY neither the tunnel nor the companion port may be
        listening — verify both are down before closing.
        </visual_companion_guide>
      until: SPEC_READY
      max_iterations: 100
      fresh_context: false
      interactive: true
      gate_message: "BRAINSTORM (R14 #1): responde con `archon workflow approve <run-id> \"<tus respuestas>\"`. Escribe `listo` (o `suficiente`) para CERRAR ya — MAIN resolverá lo que quede con sus defaults y emitirá SPEC_READY. Aprobar sin texto = 'decide tú las preguntas abiertas'."

