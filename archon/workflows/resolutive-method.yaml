# ============================================================================
# RESOLUTIVE METHOD — composition root
#
# Maps the resolutive method (Piezas 1–5) onto the Archon DAG engine as three
# stage sub workflows, inlined at load time via `include:` — each stage file
# owns exactly one phase of the method (SRP); this file owns sequencing,
# human-gate placement (R14), and the workflow-level defaults that govern
# every inlined node:
#
#   stage-design    → resolutive-design.yaml     steps 0–3: brainstorming with
#                     the human, fresh-oracle design verification, HARD GATE
#                     spec approval, planning (CONTRACT MASTERs + graph).
#   stage-execution → resolutive-execution.yaml  steps 5–11: STUBS barrier,
#                     contract review gate, VERTICAL slices or HORIZONTAL
#                     batches B–I, GATE E global + cross-file review, and the
#                     method's ONLY git commit (R17).
#   stage-finishing → resolutive-finishing.yaml  step 12: human finishing
#                     (MERGE / PR / KEEP / DISCARD) + executor.
#
# Include semantics (see authoring-workflows.md, "Reusing a Shared Sub-DAG"):
#   - Expansion happens at DISCOVERY time; the executor sees one flat DAG with
#     ids namespaced `<stageId>__<nodeId>` (e.g. stage-execution__final-commit),
#     so runs/resume/approvals behave exactly like the previous monolith.
#   - The stage files' workflow-level fields are dropped at include time —
#     the provider/model/interactive/worktree defaults BELOW govern all
#     inlined nodes; per-node overrides (model: large, context: fresh) survive.
#   - Node-output refs cannot cross an include boundary, and that is by
#     design here: ALL cross-stage handoffs are FILES under $ARTIFACTS_DIR at
#     fixed paths (R21/R22) — the deterministic decision-file readers live in
#     the stage that branches on them.
#   - The shared wave-agent anchors (&wave-agents, &dispatcher-skills,
#     &gate-reviewer-skills) live in resolutive-execution.yaml: YAML anchors
#     do not cross files, so every node consuming them stays in that stage
#     (DRY preserved — one definition, zero copies).
#
# Rule mapping notes (method-wide):
#   R9/R15  — waves ≤7 via Task sub-agents inside each batch node (engine node =
#             depth 1, sub-agent = depth 2; never deeper).
#   R16     — sub-agents inherit nothing: every role loads its superpowers
#             skills EXPLICITLY via `skills:` (node-level and per sub-agent),
#             per the Pieza 4 role → skills map:
#               brainstorm (MAIN)  [brainstorming]
#               oracle/verifier    [verification-before-completion]
#               planner            [writing-plans]
#               wave dispatcher    [dispatching-parallel-agents,
#                                   systematic-debugging,
#                                   verification-before-completion]
#               contract-worker    [test-driven-development,
#                                   verification-before-completion,
#                                   systematic-debugging]
#               file-reviewer      [requesting-code-review]
#               file-fixer         [receiving-code-review,
#                                   verification-before-completion,
#                                   systematic-debugging]
#               triage oracle (H)  [systematic-debugging]
#               gate/cross-file    [requesting-code-review,
#                                   verification-before-completion]
#               finishing executor [finishing-a-development-branch]
#             REQUIREMENT: those skills must be discoverable from
#             ~/.claude/skills/ (user) or .claude/skills/ (target repo) —
#             install them from the superpowers repo.
#             COUPLING RULE: the skills push their own cross-phase flow
#             (brainstorming wants to commit the spec and invoke
#             writing-plans; writing-plans wants docs/superpowers/ paths and
#             frequent commits; finishing wants to run its own option menu).
#             Every skill-bearing prompt therefore carries WORKFLOW OVERRIDES
#             that win on conflict: the ENGINE owns sequencing and the human
#             gates (R14), $ARTIFACTS_DIR owns file locations (R22), and
#             nobody commits except stage-execution's final-commit (R17/R21).
#   R21/R22 — all handoffs are FILES under $ARTIFACTS_DIR at FIXED, well-known
#             paths (workers/reviewers/fixers never commit). NO output_format /
#             structured output anywhere: engine routing decisions are written
#             to one-word decision files, read back by deterministic bash
#             reader nodes, and branched on with `when:`.
#   R10–R12 — workers always end DONE|BLOCKED; errors travel as data in the
#             handoff; no inline fixes; a batch that exhausts max_iterations
#             FAILS the run → escalation surfaces to the human (last resort).
#
# ARTIFACT CONTRACT (fixed paths every stage relies on):
#   design/spec-candidate.md                     — spec candidate (step 0)
#   design/design-verification.xml               — oracle report (step 1)
#   planning/planning-handoff.xml                — plan A-I + behavior graph
#   planning/contracts/<file-slug>.contract.xml  — one CONTRACT MASTER per file
#   planning/topology.txt                        — exactly VERTICAL|HORIZONTAL
#   execution/<PHASE>/<file-slug>.result.xml     — worker/fixer handoffs
#   execution/<PHASE>/<file-slug>.review.xml     — reviewer findings
#   execution/<PHASE>/checkpoint.xml             — non-Git phase checkpoint
#   gates/contract-review.xml                    — R18 review body
#   gates/contract-review-verdict.txt            — exactly PASS|FAIL
#   gates/gate-e-global.xml                      — GATE E cross-file review
#   gates/gate-e-global-verdict.txt              — exactly PASS|FAIL
#   finishing/finishing-report.xml               — final report
#
# Provider: opencode (supports inline `agents:` for the worker/reviewer/fixer
# waves). Switching `provider: pi` also works, but pi ignores `agents:` — the
# wave nodes then execute their dispatch instructions single-handedly.
#
# Models: the small/medium/large tier refs resolve from `tiers:` in
# ~/.config/archon/config.yaml (only openai/* and minimax/* opencode refs —
# the OpenCode Zen $30 budget is exhausted, so opencode/* models fail):
#   large  → openai/gpt-5.6-sol    oracles/planner/gate reviews (5 nodes)
#   medium → openai/gpt-5.6-terra  workflow default: dispatchers, brainstorm,
#                                  finishing executor, worker/fixer sub-agents
#   small  → minimax/MiniMax-M3    reserved for cheap high-volume roles; the
#                                  file-reviewer sub-agents pin it directly
#                                  (agent model: is a literal opencode ref)
#
# TODO(project): the deterministic gate commands in resolutive-execution.yaml
# are placeholders — replace every "GATE COMMAND PLACEHOLDER" block with the
# real project commands before relying on the gates.
# ============================================================================

name: resolutive-method
description: >
  Composition root of the resolutive method: brainstorm a spec with the human,
  verify the design with a fresh oracle, hard-gate human approval, plan with
  frozen CONTRACT MASTERs and a behavior graph, run the global STUBS barrier,
  pass the contract review gate, then execute by topology (VERTICAL slices or
  HORIZONTAL file-by-phase batches A-I) with per-batch review/fix/re-gate
  cycles, a global GATE E with cross-file review, a single final commit, and
  human finishing. Composed from the resolutive-design, resolutive-execution,
  and resolutive-finishing sub workflows via include.
provider: opencode
model: medium
interactive: true # required: approval gates + interactive brainstorming loop
worktree:
  enabled: true # the method mutates the checkout; always isolate

nodes:
  # Steps 0–3 — brainstorm, verify, hard gate, plan. Single sink: planner.
  - id: stage-design
    include: resolutive-design

  # Steps 5–11 — stubs, contract gate, topology execution, GATE E global, the
  # single commit. Attaches to BOTH stage entries (read-topology and
  # batch-a-stubs), reproducing the monolith's `depends_on: [planner]` edges.
  - id: stage-execution
    include: resolutive-execution
    depends_on: [stage-design]

  # Step 12 — human finishing. The execution stage ends in three CONDITIONAL
  # leaves (halt-on-weak-contracts, fail-on-gate-e-mismatch, final-commit);
  # `depends_on` on an include fans out to all of them, so the join must
  # tolerate expected skips: none_failed_min_one_success opens finishing only
  # when nothing failed and final-commit actually ran (the happy path).
  - id: stage-finishing
    include: resolutive-finishing
    depends_on: [stage-execution]
    trigger_rule: none_failed_min_one_success
