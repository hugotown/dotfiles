# ============================================================================
# archon_sldc_reviewer_file — ATOMIC CELL: review ONE result handoff
#
# Suite: archon_sldc_*. Contract (D2): $ARGUMENTS = path to a
# *.review-request.md with flat frontmatter: contractPath, resultPath, phase,
# reviewPath. Output: findings file at reviewPath + sink line "VERDICT PATH".
#
# The reviewer NEVER edits code and NEVER commits (R21); its verdict travels
# only as a file (R22). Findings are re-gated deterministically downstream,
# so the cheap high-volume tier (small) is safe here.
#
# Standalone run:
#   archon workflow run archon_sldc_reviewer_file ".archon/sldc/reviews/<slug>.<phase>.review-request.md"
# ============================================================================

name: archon_sldc_reviewer_file
description: >
  Atomic cell of the archon_sldc suite: reviews ONE logical file's phase
  result (worker/fixer handoff + actual diff) against its frozen CONTRACT
  MASTER and the phase gate criteria. Input is a *.review-request.md path in
  $ARGUMENTS. Writes a findings file (verdict APPROVED|FINDINGS with
  critical/important/minor counts + XML findings body); never edits code,
  never commits.

provider: opencode
model: programming-6
worktree:
  enabled: false

nodes:
  # --------------------------------------------------------------------------
  # 1) Fail-fast deterministic input validation
  # --------------------------------------------------------------------------
  - id: validate-request
    timeout: 15000
    bash: |
      set -u
      REQ="$ARGUMENTS"
      fm() { sed -n '/^---$/,/^---$/p' "$1" | sed -n "s/^$2:[[:space:]]*//p" | head -1 | sed -e 's/^["'\'']//' -e 's/["'\'']$//'; }
      [ -n "$REQ" ] || { echo "ERROR: \$ARGUMENTS must be the path to a *.review-request.md handoff" >&2; exit 1; }
      [ -f "$REQ" ] || { echo "ERROR: review request not found: $REQ" >&2; exit 1; }
      CONTRACT=$(fm "$REQ" contractPath); RESULT=$(fm "$REQ" resultPath)
      PHASE=$(fm "$REQ" phase); REVIEW=$(fm "$REQ" reviewPath)
      for kv in "contractPath=$CONTRACT" "resultPath=$RESULT" "phase=$PHASE" "reviewPath=$REVIEW"; do
        [ -n "${kv#*=}" ] || { echo "ERROR: request frontmatter missing required key: ${kv%%=*}" >&2; exit 1; }
      done
      [ -f "$CONTRACT" ] || { echo "ERROR: contract not found: $CONTRACT" >&2; exit 1; }
      [ -f "$RESULT" ] || { echo "ERROR: result to review not found: $RESULT" >&2; exit 1; }
      mkdir -p "$(dirname "$REVIEW")"
      echo "request=$REQ phase=$PHASE review=$REVIEW"

  # --------------------------------------------------------------------------
  # 2) Review — fresh context, findings only, file handoff (R22)
  # --------------------------------------------------------------------------
  - id: review
    depends_on: [validate-request]
    context: fresh
    output_type: sldc-file-review
    prompt: |
      You are a FILE REVIEWER of the archon_sldc suite (resolutive method).
      You review ONE logical file's result for ONE phase. You NEVER edit code
      and NEVER commit (R21). Your verdict travels ONLY as a findings file
      (R22) — never as a conversation with the author.

      SKILL INJECTION (R16 — mandatory, do this FIRST): read COMPLETELY, with
      the Read tool, before any other action:
      - ~/.config/opencode/skills/requesting-code-review/SKILL.md
      Use its review rigor; WORKFLOW OVERRIDES win over any skill guidance
      (no commits, no code edits, file handoff only).

      YOUR REVIEW REQUEST: $ARGUMENTS
      Read it. Its frontmatter gives you: contractPath (the frozen CONTRACT
      MASTER), resultPath (the worker/fixer handoff), phase, reviewPath
      (where your findings go).

      REVIEW SCOPE:
      1. Read the CONTRACT MASTER and the result handoff completely.
      2. Read the ACTUAL code the result claims to have produced (the
         contract's targetFile and allowedPaths) — review reality, not the
         handoff's self-report.
      3. Judge against: frozen signatures honored (R13), phase gate criteria
         (e.g. A: stub + sentinel present and faithful to <sentinel>;
         B: suite fails through sentinel only; D: file's tests GREEN without
         weakening them; F/G: hardening/edges within contract; I: behavior
         preserved), allowedPaths respected (R12), evidence in the handoff is
         consistent with the code.
      4. A BLOCKED result: verify the diagnosis is real and the blocker is
         not self-inflicted; classify accordingly.

      WRITE reviewPath as a .md file with flat frontmatter:
        contractId, phase, verdict: APPROVED|FINDINGS,
        critical: <n>, important: <n>, minor: <n>,
        producedBy: archon_sldc_reviewer_file, workflowRunId: $WORKFLOW_ID
      and XML body:
        <review>
          <finding severity="critical|important|minor" file="...">problem +
          why + where (cite code)</finding>
          <summary>one-minute human-readable summary</summary>
        </review>
      verdict is APPROVED only if there are ZERO critical and ZERO important
      findings. End with a one-line plain-text summary of the verdict.

  # --------------------------------------------------------------------------
  # 3) Deterministic output gate (fail-closed)
  # --------------------------------------------------------------------------
  - id: verify-review
    depends_on: [review]
    always_run: true
    timeout: 15000
    bash: |
      set -u
      fm() { sed -n '/^---$/,/^---$/p' "$1" | sed -n "s/^$2:[[:space:]]*//p" | head -1 | sed -e 's/^["'\'']//' -e 's/["'\'']$//'; }
      REVIEW=$(fm "$ARGUMENTS" reviewPath)
      [ -f "$REVIEW" ] || { echo "ERROR: reviewer ended without a findings file at $REVIEW" >&2; exit 1; }
      V=$(fm "$REVIEW" verdict)
      case "$V" in APPROVED|FINDINGS) : ;; *) echo "ERROR: review verdict invalid: '$V' (must be APPROVED|FINDINGS)" >&2; exit 1 ;; esac
      C=$(fm "$REVIEW" critical); I=$(fm "$REVIEW" important)
      case "$C" in ''|*[!0-9]*) echo "ERROR: review 'critical' count missing/invalid" >&2; exit 1 ;; esac
      case "$I" in ''|*[!0-9]*) echo "ERROR: review 'important' count missing/invalid" >&2; exit 1 ;; esac
      if [ "$V" = "APPROVED" ] && { [ "$C" -gt 0 ] || [ "$I" -gt 0 ]; }; then
        echo "ERROR: verdict APPROVED contradicts critical=$C important=$I (fail-closed)" >&2; exit 1
      fi
      echo "review valid: verdict=$V critical=$C important=$I"

  # --------------------------------------------------------------------------
  # 4) Sink — one plain parseable line: VERDICT REVIEW_PATH (R22)
  # --------------------------------------------------------------------------
  - id: report
    depends_on: [verify-review]
    always_run: true
    timeout: 15000
    bash: |
      set -u
      fm() { sed -n '/^---$/,/^---$/p' "$1" | sed -n "s/^$2:[[:space:]]*//p" | head -1 | sed -e 's/^["'\'']//' -e 's/["'\'']$//'; }
      REVIEW=$(fm "$ARGUMENTS" reviewPath)
      printf '%s %s\n' "$(fm "$REVIEW" verdict)" "$REVIEW"
