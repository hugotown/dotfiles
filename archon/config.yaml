# Archon Global Configuration
# See: https://github.com/coleam00/Archon/blob/main/docs/configuration.md

# Bot display name (shown in messages)
# botName: Archon

# Default AI assistant (must match a registered provider, e.g. claude, codex)
# defaultAssistant: claude

# Assistant defaults
# assistants:
#   claude:
#     model: sonnet
#   codex:
#     model: gpt-5.6-sol
#     modelReasoningEffort: medium
#     webSearchMode: disabled
#     additionalDirectories:
#       - /absolute/path/to/other/repo

# Model tier presets (usable as model: small / medium / large)
# Constraint: only openai/* and minimax/* opencode refs are allowed here —
# opencode/* models bill against the OpenCode Zen workspace, whose $30/month
# limit is exhausted; openai/* (oauth) and minimax/* are the working paid
# paths. No `effort:` on these tiers: the opencode provider does not support
# effort control (capabilities.ts: effortControl: false).
# Cost/context reference (per 1M tokens, from pi models-store):
#   openai/gpt-5.6-sol    $5 in / $30 out,   372k ctx  — top reasoning
#   openai/gpt-5.6-terra  $2.5 in / $15 out, 372k ctx  — balanced default
#   minimax/MiniMax-M3    $0.3 in / $1.2 out, 1M ctx   — cheap high-volume
tiers:
  large: { provider: opencode, model: openai/gpt-5.6-sol }
  medium: { provider: opencode, model: openai/gpt-5.6-terra }
  small: { provider: opencode, model: minimax/MiniMax-M3 }

# Streaming mode per platform (stream or batch)
# streaming:
#   telegram: stream
#   discord: batch
#   slack: batch

# Concurrency settings
# concurrency:
#   maxConversations: 10
