# Archon Global Configuration
# See: https://github.com/coleam00/Archon/blob/main/docs/configuration.md

# Bot display name (shown in messages)
# botName: Archon

# Default AI assistant (must match a registered provider, e.g. claude, codex)
# defaultAssistant: claude

# Assistant defaults
# assistants:
#   claude:
#     model: sonnet
#   codex:
#     model: gpt-5.6-sol
#     modelReasoningEffort: medium
#     webSearchMode: disabled
#     additionalDirectories:
#       - /absolute/path/to/other/repo

# Model tier presets (usable as model: <dimension>-<level>, e.g. programming-10,
# reasoning-5, design-7). Four dimensions x 10 levels (10 = most capable, 1 = most basic).
# Constraint: only openai/*, minimax/* and opencode-go/* refs are allowed here —
# opencode/* models bill against the OpenCode Zen workspace, whose $30/month
# limit is exhausted; openai/* (oauth), minimax/* and opencode-go/* are the
# working paths. No `effort:` on these tiers: the opencode provider does not
# support effort control (capabilities.ts: effortControl: false).
#
# Capability scale (estimated by family/generation, not measured benchmarks).
# -fast (openai) / -highspeed (minimax) variants are the same model, just faster.
# Anchors: gpt-5.6-sol = 10 (top), kimi-k3 = programming 5, mimo-v2.5 = 1.
# Legend: prg=programming rsn=reasoning pln=planning dsg=design.
#
# 10  all: gpt-5.6-sol
#  9  all: gpt-5.6-terra
#  8  all: gpt-5.5          | dsg: glm-5.2
#  7  all: qwen3.7-max      | dsg: kimi-k3
#  6  prg/dsg: MiniMax-M3   | rsn/pln: glm-5.2
#  5  prg: kimi-k3          | rsn/pln: gpt-5.4       | dsg: glm-5.1
#  4  all: gpt-5.6-luna
#  3  prg: glm-5.1          | rsn/dsg: qwen3.7-plus  | pln: kimi-k2.7-code
#  2  all: gpt-5.4-mini
#  1  all: mimo-v2.5
#
# Near-equivalent alternates per level:
#  7: glm-5.2 (prg), kimi-k3 (rsn/pln)    5: kimi-k2.7-code, deepseek-v4-pro (prg)
#  4: gpt-5.3-codex-spark (prg), MiniMax-M2.7    3: kimi-k2.6, grok-4.5
#  2: deepseek-v4-flash, MiniMax-M2.5    1: MiniMax-M2
tiers:
  # Programming: code specialists punch above their size; top end is GPT 5.6.
  programming-10: { provider: opencode, model: openai/gpt-5.6-sol }
  programming-9: { provider: opencode, model: openai/gpt-5.6-terra }
  programming-8: { provider: opencode, model: openai/gpt-5.5 }
  programming-7: { provider: opencode, model: opencode-go/qwen3.7-max }
  programming-6: { provider: opencode, model: minimax/MiniMax-M3 }
  programming-5: { provider: opencode, model: opencode-go/kimi-k3 }
  programming-4: { provider: opencode, model: openai/gpt-5.6-luna }
  programming-3: { provider: opencode, model: opencode-go/glm-5.1 }
  programming-2: { provider: opencode, model: openai/gpt-5.4-mini }
  programming-1: { provider: opencode, model: opencode-go/mimo-v2.5 }

  # Reasoning: sol anchors the top; kimi-k3/qwen3.7-max lead the opencode-go side.
  reasoning-10: { provider: opencode, model: openai/gpt-5.6-sol }
  reasoning-9: { provider: opencode, model: openai/gpt-5.6-terra }
  reasoning-8: { provider: opencode, model: openai/gpt-5.5 }
  reasoning-7: { provider: opencode, model: opencode-go/qwen3.7-max }
  reasoning-6: { provider: opencode, model: opencode-go/glm-5.2 }
  reasoning-5: { provider: opencode, model: openai/gpt-5.4 }
  reasoning-4: { provider: opencode, model: openai/gpt-5.6-luna }
  reasoning-3: { provider: opencode, model: opencode-go/qwen3.7-plus }
  reasoning-2: { provider: opencode, model: openai/gpt-5.4-mini }
  reasoning-1: { provider: opencode, model: opencode-go/mimo-v2.5 }

  # Planning: long-horizon/agentic; small code models plan worse than they execute.
  planning-10: { provider: opencode, model: openai/gpt-5.6-sol }
  planning-9: { provider: opencode, model: openai/gpt-5.6-terra }
  planning-8: { provider: opencode, model: openai/gpt-5.5 }
  planning-7: { provider: opencode, model: opencode-go/qwen3.7-max }
  planning-6: { provider: opencode, model: opencode-go/glm-5.2 }
  planning-5: { provider: opencode, model: openai/gpt-5.4 }
  planning-4: { provider: opencode, model: openai/gpt-5.6-luna }
  planning-3: { provider: opencode, model: opencode-go/kimi-k2.7-code }
  planning-2: { provider: opencode, model: openai/gpt-5.4-mini }
  planning-1: { provider: opencode, model: opencode-go/mimo-v2.5 }

  # Design: GLM rises (strong frontend/UI); codex minis drop to the bottom.
  design-10: { provider: opencode, model: openai/gpt-5.6-sol }
  design-9: { provider: opencode, model: openai/gpt-5.6-terra }
  design-8: { provider: opencode, model: opencode-go/glm-5.2 }
  design-7: { provider: opencode, model: opencode-go/kimi-k3 }
  design-6: { provider: opencode, model: minimax/MiniMax-M3 }
  design-5: { provider: opencode, model: opencode-go/glm-5.1 }
  design-4: { provider: opencode, model: openai/gpt-5.6-luna }
  design-3: { provider: opencode, model: opencode-go/qwen3.7-plus }
  design-2: { provider: opencode, model: openai/gpt-5.4-mini }
  design-1: { provider: opencode, model: opencode-go/mimo-v2.5 }

# Streaming mode per platform (stream or batch)
# streaming:
#   telegram: stream
#   discord: batch
#   slack: batch

# Concurrency settings
# concurrency:
#   maxConversations: 10
